fabric:
  sql_server: ''
  database: DealerPulse
  warehouse_database: DW_DealerPulse
  schema: INFORMATION_MART
  warehouse_schema: dbo
azure:
  region: eastus
  resource_group: RG-Miniature-Development
  subscription_id: ''
ai:
  deployment: gpt-4.1
  api_version: 2024-08-01-preview
  sql_generation_temperature: 0.1
  insights_temperature: 0.3
  yaml_generation_temperature: 0.2
  max_tokens: 4096
  cache_first: true
cache:
  enabled: true
  ttl_seconds: 3600
  max_result_rows: 5000
  session_cache_table: dbo.QUERY_RESULT_CACHE
  similarity_threshold: 0.95
session:
  idle_timeout_seconds: 300
  idle_warning_seconds: 60
ui:
  app_title: DealerPulse
  brand_name: DealerPulse
  page_icon_url: https://upload.wikimedia.org/wikipedia/commons/2/2e/Yash_Technologies_logo.png
  default_bg_color: '#FBF9F4'
  support_email: support@yashtechnologies.com
  region: eastus
  date_format: '%Y-%m-%d'
  currency_symbol: $
  max_chart_rows: 100
  genie_history_count: 10
  saved_insights_count: 20
metadata:
  schema_file: schema_metadata.yaml
  auto_update_on_new_table: true
data_vault:
  hub_prefix: HUB_
  sat_prefix: SAT_
  link_prefix: LNK_
  bridge_prefix: BRG_
  pit_prefix: PIT_
  raw_vault_schema: RAW_VAULT
  business_vault_schema: BUSINESS_VAULT
  information_mart_schema: INFORMATION_MART
naming_conventions:
  fact_prefix: FACT_
  dim_prefix: DIM_
  view_suffix: _VW
  history_table: GENIE_QUESTION_HISTORY
  saved_insights_table: SAVED_INSIGHTS
  cache_table: QUERY_RESULT_CACHE
  data_validation_table: DATA_VALIDATION_RESULTS
  genie_context_memory_table: GENIE_CONTEXT_MEMORY
features:
  genie_history: true
  insights_save: true
  data_vault_ai: true
  auto_yaml_update: true
  performance_testing: true
  integration_testing: true
  data_validation: true
testing:
  query_timeout_seconds: 30
  max_acceptable_latency_ms: 5000
  min_row_count_sanity: 1
  integration_db_check: true
  integration_ai_check: true
  integration_cache_check: true
memory:
  short_term:
    enabled: true
    max_messages: 10
    window_minutes: 15
  long_term:
    enabled: true
    max_contexts: 5000
    table: genie_context_memory
  genie:
    context_window_size: 5
name: DEALER_KPI_MODEL
description: Semantic model for Dealer KPIs - Sales, Performance, Cash Management
tables: []
