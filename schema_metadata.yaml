    table: vw_average_repair_turnaround_time
  description: 'Tracks the average time taken to complete service repairs. Monthly pre-aggregated data with turnaround hours
    per dealer. Primary join key: DEALER_NAME'
  dimensions:
  - name: DEALER_NAME
    expr: DEALER_NAME
    description: Dealer Name
    label: Dealer Name
    synonyms: &id001
    - dealer
    - distributor name
  time_dimensions:
  - name: PERIOD_YEAR
    expr: PERIOD_YEAR
    description: Period Year
    label: Period Year
    time_granularity: year
  - name: PERIOD_MONTH
    expr: PERIOD_MONTH
    description: Period Month
    label: Period Month
    time_granularity: month
  - name: PERIOD_START_DATE
    expr: PERIOD_START_DATE
    description: Period Start Date
    label: Period Start Date
    time_granularity: day
