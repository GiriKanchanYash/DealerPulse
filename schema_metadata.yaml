name: DealerPulse_KPI_MODEL
description: Semantic model for DealerPulse KPIs covering Service Performance, Sales Growth, Cash Conversion Cycle, and Inventory
  Metrics. Configured for Microsoft Fabric (DealerPulse.INFORMATION_MART) with Azure OpenAI.
owner: DealerPulse Analytics Team
created_date: 2026-02-13
platform: Microsoft Fabric
ai_engine: Azure OpenAI
model_quality_warnings: "⚠️ CRITICAL WARNINGS FOR Azure OpenAI ANALYST - READ CAREFULLY\n\nVIEW NAMES vs COLUMN NAMES (MOST IMPORTANT):\n\
  - Names like vw_dealer_contribution_margin, vw_gross_profit_margin are TABLE/VIEW names. Use them ONLY in FROM and\
  \ JOIN (e.g. FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin gpm).\n- COLUMNS are the attributes defined\
  \ in dimensions and facts for each view (e.g. DEALER_NAME, CONTRIBUTION_MARGIN_PCT, GROSS_PROFIT_MARGIN_PCT). Use these\
  \ in SELECT, WHERE, ORDER BY with an alias (e.g. gpm.DEALER_NAME, gpm.GROSS_PROFIT_MARGIN_PCT).\n- NEVER use a view name\
  \ as a column. Writing t.vw_gross_profit_margin or alias.vw_dealer_contribution_margin is INVALID and causes \"invalid\
  \ identifier\" errors. Only the actual column names (DEALER_NAME, CONTRIBUTION_MARGIN_PCT, etc.) are valid.\n\nAzure OpenAI\
  \ has been generating SQL with these common errors. Every generated query MUST be validated for:\n\n1. AMBIGUOUS JOINS -\
  \ Azure OpenAI generates: ON DEALER_NAME = DEALER_NAME (WRONG)\n  Fix: Always use explicit table aliases: ON t.DEALER_NAME\
  \ = s.DEALER_NAME ✓\n\n2. MISSING TABLE ALIASES - Azure OpenAI generates: SELECT DEALER_NAME, AVG_TURNAROUND_HOURS (WRONG)\n\
  \  Fix: Always qualify columns: SELECT t.DEALER_NAME, s.AVG_TURNAROUND_HOURS ✓\n\n3. NO CTE PREAGGREGATE - Azure OpenAI generates\
  \ joins without pre-aggregation (WRONG)\n  Fix: Create CTEs with GROUP BY first, then join: WITH agg1 AS (SELECT ... GROUP\
  \ BY DEALER_NAME) ✓\n\n4. DUPLICATE COLUMNS - Azure OpenAI selects same column multiple times (WRONG)\n  Fix: Select only\
  \ once with proper alias: SELECT t.DEALER_NAME (not DEALER_NAME twice)\n\nIf ANY generated SQL contains these\
  \ patterns, REJECT IT and demand a corrected version with:\n- Table aliases on every table (t, s, b, o, c, m, etc.)\n- Explicit\
  \ ON clause with qualified columns (ON t.col = s.col)\n- CTEs for pre-aggregation when joining fact tables\n- No ambiguous\
  \ column references\n\nMicrosoft Fabric SQL Notes:\n- Use DealerPulse.INFORMATION_MART.<table_name> as fully qualified reference\n\
  - Do NOT use Snowflake-specific QUALIFY keyword; use subqueries or CTEs with ROW_NUMBER() instead\n- Cast syntax: use CAST(col AS FLOAT) not col::FLOAT\n\
  - Window functions and CTEs are fully supported\n"
analysis_capabilities:
  descriptive:
    enabled: true
    description: Present facts and current state of DealerPulse performance metrics
  prescriptive:
    enabled: true
    description: Provide specific, data-driven recommendations with exact numbers and concrete actions
  predictive:
    enabled: true
    description: Forecast future trends and business impact based on current metrics and historical patterns
azure_openai_optimization:
  description: Performance tuning for Azure OpenAI Analyst to reduce response time and improve SQL quality
  performance_tips:
  - ALWAYS use TOP clause or WHERE filters when exploring data to prevent full table scans (e.g. SELECT TOP 100 ...)
  - PRE-AGGREGATE first in CTEs before joining - this reduces join cardinality and speeds execution
  - 'Use indexed columns: DEALER_NAME, PERIOD_YEAR, PERIOD_MONTH are indexed and should be in WHERE clauses'
  - Avoid SELECT * - always explicitly select only needed columns to reduce data transfer
  - Use LEFT JOIN not INNER JOIN to preserve dealer records even with missing data
  - Filter by PERIOD_YEAR/PERIOD_MONTH early in CTEs to reduce rows processed
  - 'Push filters down: WHERE clauses in CTEs are faster than HAVING clauses'
  response_time_optimization:
  - 'For quick responses: Use verified_queries section - these are pre-tested and fast'
  - 'Azure OpenAI should recognize patterns: If user asks ''top dealers'', immediately use top_5_dealers_by_revenue query'
  - Don't regenerate queries for common questions - FIRST check verified_queries for exact match
  - 'Response time targets: <5 seconds for simple queries, <15 seconds for complex joins'
  - If response takes >20 seconds, ask user if they want a simpler analysis instead
