join_constraints:
  description: Strict rules that MUST be followed when joining dealer tables.
  mandatory_rules:
  - rule_id: ALWAYS_USE_TABLE_ALIASES
    severity: CRITICAL_ERROR
    rule: Every table in FROM/JOIN MUST have an explicit alias
    pattern: FROM DealerPulse.INFORMATION_MART.vw_table_name AS <alias>
    example_correct: FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin AS m
    example_wrong: FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin
  - rule_id: EXPLICIT_TABLE_QUALIFIED_JOINS
    severity: CRITICAL_ERROR
    rule: ON clauses MUST use table-qualified column names (alias.column_name)
    example_correct: ON m.DEALER_NAME = g.DEALER_NAME
    example_wrong: ON DEALER_NAME = DEALER_NAME
  - rule_id: CTE_PREAGGREGATION_REQUIRED
    severity: HIGH_ERROR
    rule: When joining 3+ tables, ALWAYS pre-aggregate each in separate CTEs first
    pattern: "WITH table1_agg AS (\n  SELECT DEALER_NAME, AGG_FUNC(metric) FROM table1 GROUP BY DEALER_NAME\n),\ntable2_agg AS (\n\
      \  SELECT DEALER_NAME, AGG_FUNC(metric) FROM table2 GROUP BY DEALER_NAME\n)\nSELECT t1.DEALER_NAME, t1.metric, t2.metric\n\
      FROM table1_agg t1 LEFT JOIN table2_agg t2 ON t1.DEALER_NAME = t2.DEALER_NAME\n"
  - rule_id: USE_LEFT_JOIN_NOT_INNER
    severity: MEDIUM_ERROR
    rule: Use LEFT JOIN instead of INNER JOIN to preserve dealers with missing data
    example_correct: LEFT JOIN vw_backorder_incidence b ON t.DEALER_NAME = b.DEALER_NAME
    example_wrong: INNER JOIN vw_backorder_incidence b ON t.DEALER_NAME = b.DEALER_NAME
  - rule_id: PRODUCT_CATEGORY_JOINS
    severity: CRITICAL_ERROR
    rule: vw_stock_availability_dealer and vw_sales_per_product_category have PRODUCT_CATEGORY - must aggregate by DEALER_NAME first before joining
    correct_pattern: "WITH stock_agg AS (\n  SELECT DEALER_NAME, AVG(STOCK_AVAILABILITY_PCT) as avg_stock\n  FROM DealerPulse.INFORMATION_MART.vw_stock_availability_dealer\n\
      \  GROUP BY DEALER_NAME\n)\n"
  - rule_id: NO_QUALIFY_KEYWORD
    severity: CRITICAL_ERROR
    rule: Microsoft Fabric does not support Snowflake QUALIFY. Use ROW_NUMBER() CTE pattern.
    correct_pattern: "WITH ranked AS (\n  SELECT *, ROW_NUMBER() OVER (ORDER BY TOTAL_REVENUE DESC) AS rn\n  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n\
      )\nSELECT * FROM ranked WHERE rn <= 5\n"
    incorrect_pattern: "SELECT * FROM ... QUALIFY ROW_NUMBER() OVER (...) <= 5"
table_join_matrix:
  description: Defines how each table can be joined. All tables join on DEALER_NAME as primary key.
  join_rules:
  - primary_table: vw_average_repair_turnaround_time
    alias: t
    joinable_to:
    - table: vw_backorder_incidence
      alias: b
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON t.DEALER_NAME = b.DEALER_NAME
    - table: vw_stock_availability_dealer
      alias: s
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON t.DEALER_NAME = s.DEALER_NAME
      note: 'Pre-aggregate vw_stock_availability_dealer to DEALER_NAME level first (GROUP BY DEALER_NAME ignoring PRODUCT_CATEGORY)'
    - table: vw_order_lead_time
      alias: l
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON t.DEALER_NAME = l.DEALER_NAME
    - table: vw_gross_profit_margin
      alias: m
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON t.DEALER_NAME = m.DEALER_NAME
  - primary_table: vw_gross_profit_margin
    alias: m
    joinable_to:
    - table: vw_cash_conversion_cycle
      alias: c
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON m.DEALER_NAME = c.DEALER_NAME
    - table: vw_dealer_contribution_margin
      alias: cm
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON m.DEALER_NAME = cm.DEALER_NAME
    - table: vw_dealer_revenue_growth
      alias: r
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON m.DEALER_NAME = r.DEALER_NAME
  - primary_table: vw_stock_availability_dealer
    alias: s
    note: Has PRODUCT_CATEGORY - must aggregate at DEALER_NAME level before joining to other tables
    joinable_to:
    - table: vw_backorder_incidence
      alias: b
      join_key: DEALER_NAME
      join_type: LEFT JOIN
      on_clause: ON s.DEALER_NAME = b.DEALER_NAME
sql_generation_rules:
  description: Rules that MUST be enforced in all generated SQL queries for Microsoft Fabric
  generation_requirements:
  - requirement_id: ALIAS_EVERY_TABLE
    description: 'Assign unique 1-2 letter alias to each table: t, s, b, m, c, r, o, v, etc.'
    severity: CRITICAL
  - requirement_id: QUALIFY_ALL_COLUMNS
    description: Prefix every column reference with table alias (m.DEALER_NAME, not DEALER_NAME)
    severity: CRITICAL
  - requirement_id: EXPLICIT_ON_CLAUSE
    description: 'Every JOIN must have ON clause with both tables qualified: ON alias1.key = alias2.key'
    severity: CRITICAL
    example_correct: LEFT JOIN DealerPulse.INFORMATION_MART.vw_backorder_incidence AS b ON t.DEALER_NAME = b.DEALER_NAME
    example_wrong: LEFT JOIN vw_backorder_incidence b ON DEALER_NAME = DEALER_NAME
  - requirement_id: PREAGGREGATE_FOR_MULTI_TABLE
    description: For queries joining 3+ tables, use CTEs to pre-aggregate each table separately first
    severity: HIGH
  - requirement_id: NO_QUALIFY_KEYWORD
    description: Never use QUALIFY keyword (Snowflake only). Use ROW_NUMBER() in a CTE with WHERE rn <= N
    severity: CRITICAL
  - requirement_id: NO_DOUBLE_COLON_CAST
    description: Never use ::FLOAT or ::INTEGER casting syntax (Snowflake only). Use CAST(col AS FLOAT) or CAST(col AS INT)
    severity: CRITICAL
  - requirement_id: TOP_INSTEAD_OF_LIMIT
    description: Use SELECT TOP N for row limiting, not LIMIT N (T-SQL standard)
    severity: HIGH
  - requirement_id: GROUP_BY_CONSISTENCY
    description: All non-aggregated columns in SELECT must be in GROUP BY clause
    severity: CRITICAL
  - requirement_id: PRODUCT_CATEGORY_AGGREGATE_FIRST
    description: Tables with PRODUCT_CATEGORY (vw_stock_availability_dealer, vw_sales_per_product_category) must GROUP BY
      PRODUCT_CATEGORY before joining to other tables
    severity: CRITICAL
relationships:
- description: Service metrics by dealer - aggregate across all periods, join on DEALER_NAME only with explicit table aliases
  join_key:
  - DEALER_NAME
  join_pattern: "WITH service_agg AS (\n  SELECT DEALER_NAME, AVG(AVG_TURNAROUND_HOURS) as avg_tat FROM DealerPulse.INFORMATION_MART.vw_average_repair_turnaround_time\
    \ GROUP BY DEALER_NAME\n),\nlead_agg AS (\n  SELECT DEALER_NAME, AVG(AVG_ORDER_LEAD_TIME_DAYS) as avg_lead FROM\
    \ DealerPulse.INFORMATION_MART.vw_order_lead_time GROUP BY DEALER_NAME\n)\nSELECT s.DEALER_NAME, s.avg_tat, l.avg_lead FROM service_agg s\
    \ LEFT JOIN lead_agg l ON s.DEALER_NAME = l.DEALER_NAME\n"
  primary_table: vw_average_repair_turnaround_time
  joinable_tables:
  - vw_order_lead_time
  - vw_stock_availability_dealer
  - vw_backorder_incidence
- description: Inventory metrics join for stock and backorder analysis
  join_key:
  - DEALER_NAME
  join_pattern: "WITH stock_agg AS (\n  SELECT DEALER_NAME, AVG(STOCK_AVAILABILITY_PCT) as avg_stock FROM DealerPulse.INFORMATION_MART.vw_stock_availability_dealer\
    \ GROUP BY DEALER_NAME\n),\nbackorder_agg AS (\n  SELECT DEALER_NAME, AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder\
    \ FROM DealerPulse.INFORMATION_MART.vw_backorder_incidence GROUP BY DEALER_NAME\n)\nSELECT st.DEALER_NAME, st.avg_stock, b.avg_backorder\
    \ FROM stock_agg st LEFT JOIN backorder_agg b ON st.DEALER_NAME = b.DEALER_NAME\n"
  primary_table: vw_stock_availability_dealer
  joinable_tables:
  - vw_backorder_incidence
- description: Financial efficiency metrics - aggregate first in CTEs, then join on DEALER_NAME
  join_key:
  - DEALER_NAME
  join_pattern: "WITH cash_agg AS (\n  SELECT DEALER_NAME, AVG(CCC) as avg_ccc FROM DealerPulse.INFORMATION_MART.vw_cash_conversion_cycle GROUP BY\
    \ DEALER_NAME\n),\nprofit_agg AS (\n  SELECT DEALER_NAME, AVG(GROSS_PROFIT_MARGIN_PCT) as avg_gpm FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\
    \ GROUP BY DEALER_NAME\n)\nSELECT c.DEALER_NAME, c.avg_ccc, p.avg_gpm FROM cash_agg c LEFT JOIN profit_agg p\
    \ ON c.DEALER_NAME = p.DEALER_NAME\n"
  primary_table: vw_cash_conversion_cycle
  joinable_tables:
  - vw_gross_profit_margin
  - vw_dealer_contribution_margin
query_patterns:
- pattern_name: Dealer Profitability Analysis
  description: Combine financial metrics for complete profitability view
  template: "SELECT\n  m.DEALER_NAME,\n  m.GROSS_PROFIT_MARGIN_PCT,\n  c.CCC,\n  cm.CONTRIBUTION_MARGIN_PCT\nFROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\
    \ m\nLEFT JOIN DealerPulse.INFORMATION_MART.vw_cash_conversion_cycle c\n  ON m.DEALER_NAME = c.DEALER_NAME\nLEFT JOIN DealerPulse.INFORMATION_MART.vw_dealer_contribution_margin cm\n\
    \  ON m.DEALER_NAME = cm.DEALER_NAME\nORDER BY m.GROSS_PROFIT_MARGIN_PCT DESC"
- pattern_name: Dealer Service & Sales Performance
  description: Combine service efficiency with sales volume - aggregate first, then join on DEALER_NAME
  template: "WITH service_agg AS (\n  SELECT DEALER_NAME, AVG(AVG_TURNAROUND_HOURS) as avg_repair_hours\n  FROM DealerPulse.INFORMATION_MART.vw_average_repair_turnaround_time\
    \ GROUP BY DEALER_NAME\n),\nlead_agg AS (\n  SELECT DEALER_NAME, AVG(AVG_ORDER_LEAD_TIME_DAYS) as avg_lead_time\n  FROM DealerPulse.INFORMATION_MART.vw_order_lead_time\
    \ GROUP BY DEALER_NAME\n),\nrevenue_agg AS (\n  SELECT DEALER_NAME, SUM(TOTAL_REVENUE) as total_revenue\n  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\
    \ GROUP BY DEALER_NAME\n)\nSELECT\n  t.DEALER_NAME,\n  t.avg_repair_hours,\n  l.avg_lead_time,\n  r.total_revenue\nFROM service_agg t\n\
    LEFT JOIN lead_agg l ON t.DEALER_NAME = l.DEALER_NAME\nLEFT JOIN revenue_agg r ON t.DEALER_NAME = r.DEALER_NAME\nORDER BY t.avg_repair_hours ASC"
verified_queries:
- name: dealer_profitability_analysis
  question: Which dealers have low profits? What are the root causes?
  use_as_onboarding_question: true
  sql: "WITH gpm AS (\n  SELECT DEALER_NAME, GROSS_PROFIT_MARGIN_PCT, TOTAL_REVENUE, TOTAL_COGS,\n        AVG(GROSS_PROFIT_MARGIN_PCT)\
    \ OVER() AS avg_gpm\n  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n)\nSELECT\n  DEALER_NAME,\n  GROSS_PROFIT_MARGIN_PCT,\n\
    \  TOTAL_REVENUE,\n  TOTAL_COGS,\n  ROUND(avg_gpm, 2) AS AVERAGE_GPM\nFROM gpm\nWHERE GROSS_PROFIT_MARGIN_PCT < avg_gpm\n\
    ORDER BY GROSS_PROFIT_MARGIN_PCT ASC"
- name: check_dealer_ccc
  question: What is the Cash Conversion Cycle for dealers? Who has the worst cash cycle?
  use_as_onboarding_question: true
  sql: "SELECT\n  DEALER_NAME,\n  CCC,\n  DSO,\n  DIO,\n  DPO,\n  CASE\n    WHEN CCC > 60 THEN 'CRITICAL - High working\
    \ capital stress'\n    WHEN CCC > 45 THEN 'WARNING - Above-average cycle time'\n    WHEN CCC < 30 THEN 'GOOD - Efficient\
    \ cash management'\n    ELSE 'NORMAL'\n  END AS CASH_HEALTH\nFROM DealerPulse.INFORMATION_MART.vw_cash_conversion_cycle\n\
    ORDER BY CCC DESC"
- name: dealer_gross_margin
  question: Show the gross profit margin for all dealers. Who has the lowest margins?
  use_as_onboarding_question: true
  sql: "SELECT\n  DEALER_NAME,\n  TOTAL_REVENUE,\n  TOTAL_COGS,\n  GROSS_PROFIT_MARGIN_PCT,\n  ROUND(100.0 * GROSS_PROFIT_MARGIN_PCT\
    \ / AVG(GROSS_PROFIT_MARGIN_PCT) OVER (), 1) AS PCT_VS_AVG\nFROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n\
    ORDER BY GROSS_PROFIT_MARGIN_PCT ASC"
- name: high_growth_dealers
  question: Which dealers had strong revenue growth? Show growth trends.
  use_as_onboarding_question: true
  sql: "SELECT\n  DEALER_NAME,\n  PERIOD_YEAR,\n  REVENUE,\n  PREV_MONTH_REVENUE,\n  REVENUE_GROWTH_MOM_PERCENT,\n  CASE\
    \\ \n    WHEN REVENUE_GROWTH_MOM_PERCENT > 15 THEN 'STRONG'\n    WHEN REVENUE_GROWTH_MOM_PERCENT > 5 THEN 'MODERATE'\n\
    \    WHEN REVENUE_GROWTH_MOM_PERCENT < 0 THEN 'DECLINING'\n    ELSE 'FLAT'\n  END AS GROWTH_CATEGORY\nFROM DealerPulse.INFORMATION_MART.vw_dealer_revenue_growth\n\
    ORDER BY REVENUE_GROWTH_MOM_PERCENT DESC"
- name: dealer_inventory_health
  question: Show stock availability and backorder rates by dealer. Which dealers have inventory issues?
  use_as_onboarding_question: true
  sql: "WITH stock_agg AS (\n  SELECT\n    DEALER_NAME,\n    AVG(STOCK_AVAILABILITY_PCT) as avg_stock_availability\n  FROM DealerPulse.INFORMATION_MART.vw_stock_availability_dealer\n\
    \  GROUP BY DEALER_NAME\n),\nbackorder_agg AS (\n  SELECT\n    DEALER_NAME,\n    AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder_rate\n\
    \  FROM DealerPulse.INFORMATION_MART.vw_backorder_incidence\n  GROUP BY DEALER_NAME\n)\nSELECT\n  s.DEALER_NAME,\n  ROUND(s.avg_stock_availability, 1) as avg_stock_availability,\n\
    \  COALESCE(b.avg_backorder_rate, 0) as backorder_incidence,\n  CASE\n    WHEN s.avg_stock_availability < 85 AND COALESCE(b.avg_backorder_rate,\
    \ 0) > 15\n      THEN 'CRITICAL - Both low availability and high backorders'\n    WHEN s.avg_stock_availability < 85\
    \\n      THEN 'WARNING - Low stock availability'\n    WHEN COALESCE(b.avg_backorder_rate, 0) > 15\n      THEN 'WARNING\
    \ - High backorder rate'\n    ELSE 'HEALTHY'\n  END AS INVENTORY_STATUS\nFROM stock_agg s\nLEFT JOIN backorder_agg b\n\
    \  ON s.DEALER_NAME = b.DEALER_NAME\nORDER BY s.avg_stock_availability ASC"
- name: compare_service_efficiency_across_dealers
  question: Compare service efficiency across dealers. Show repair time, stock availability, backorder rate, and lead time.
  use_as_onboarding_question: true
  sql: "WITH service_metrics AS (\n  SELECT\n    t.DEALER_NAME,\n    AVG(t.AVG_TURNAROUND_HOURS) as avg_repair_time,\n    AVG(s.STOCK_AVAILABILITY_PCT) as avg_stock_availability,\n\
    \    AVG(b.BACKORDER_INCIDENCE_PCT) as avg_backorder_rate,\n    AVG(o.AVG_ORDER_LEAD_TIME_DAYS) as avg_lead_time\n  FROM DealerPulse.INFORMATION_MART.vw_average_repair_turnaround_time t\n\
    \  LEFT JOIN DealerPulse.INFORMATION_MART.vw_stock_availability_dealer s\n    ON t.DEALER_NAME = s.DEALER_NAME\n  LEFT JOIN DealerPulse.INFORMATION_MART.vw_backorder_incidence b\n\
    \    ON t.DEALER_NAME = b.DEALER_NAME\n  LEFT JOIN DealerPulse.INFORMATION_MART.vw_order_lead_time o\n    ON t.DEALER_NAME = o.DEALER_NAME\n  GROUP BY t.DEALER_NAME\n\
    )\nSELECT *,\n  CASE\n    WHEN avg_repair_time <= (SELECT AVG(avg_repair_time) FROM service_metrics)\n    AND avg_stock_availability >= (SELECT AVG(avg_stock_availability) FROM service_metrics)\n\
    \    AND avg_backorder_rate <= (SELECT AVG(avg_backorder_rate) FROM service_metrics)\n    THEN 'High Efficiency'\n    ELSE 'Needs Improvement'\n\
    \  END as efficiency_rating\nFROM service_metrics\nORDER BY avg_repair_time ASC"
- name: top_5_dealers_by_revenue
  question: Who are my top 5 dealers? List all the top 5 dealers. Show the top 5 dealers by revenue. What are my top dealers?
  use_as_onboarding_question: true
  sql: "WITH ranked AS (\n  SELECT\n    DEALER_NAME,\n    TOTAL_REVENUE,\n    ROUND(100.0 * TOTAL_REVENUE / SUM(TOTAL_REVENUE) OVER (), 2) as revenue_share_pct,\n\
    \    GROSS_PROFIT_MARGIN_PCT,\n    ROW_NUMBER() OVER (ORDER BY TOTAL_REVENUE DESC) as rank\n  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n\
    \  WHERE TOTAL_REVENUE IS NOT NULL\n)\nSELECT * FROM ranked WHERE rank <= 5\nORDER BY TOTAL_REVENUE DESC"
- name: top_5_dealers_by_profitability
  question: Top 5 most profitable dealers. Which dealers are most profitable?
  sql: "WITH ranked AS (\n  SELECT\n    DEALER_NAME,\n    GROSS_PROFIT_MARGIN_PCT,\n    TOTAL_REVENUE,\n    TOTAL_COGS,\n    ROUND(TOTAL_REVENUE *\
    \ GROSS_PROFIT_MARGIN_PCT / 100, 2) as gross_profit_amount,\n    ROW_NUMBER() OVER (ORDER BY GROSS_PROFIT_MARGIN_PCT DESC) as rank\n  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n\
    \  WHERE GROSS_PROFIT_MARGIN_PCT IS NOT NULL\n)\nSELECT * FROM ranked WHERE rank <= 5\nORDER BY GROSS_PROFIT_MARGIN_PCT DESC"
- name: top_5_dealers_by_growth
  question: Top 5 fastest growing dealers. Which dealers have the highest growth?
  sql: "WITH ranked AS (\n  SELECT\n    DEALER_NAME,\n    REVENUE_GROWTH_MOM_PERCENT,\n    REVENUE,\n    PREV_MONTH_REVENUE,\n\
    \    PERIOD_YEAR,\n    ROW_NUMBER() OVER (ORDER BY REVENUE_GROWTH_MOM_PERCENT DESC) as rank\n  FROM DealerPulse.INFORMATION_MART.vw_dealer_revenue_growth\n\
    \  WHERE REVENUE_GROWTH_MOM_PERCENT IS NOT NULL\n)\nSELECT * FROM ranked WHERE rank <= 5\nORDER BY REVENUE_GROWTH_MOM_PERCENT DESC"
- name: declining_product_categories
  question: Which categories show declining sales? Which product categories are declining?
  use_as_onboarding_question: false
  sql: "WITH category_metrics AS (\n  SELECT\n    PRODUCT_CATEGORY,\n    SUM(COALESCE(TOTAL_REVENUE, 0)) AS total_revenue,\n    SUM(COALESCE(TOTAL_QUANTITY, 0)) AS total_quantity,\n\
    \    COUNT(DISTINCT DEALER_NAME) AS num_dealers,\n    COUNT(*) AS sample_count,\n    CASE\n      WHEN COUNT(*) > 0 THEN ROUND(CAST(SUM(COALESCE(TOTAL_REVENUE, 0)) AS FLOAT) / COUNT(*), 2)\n\
    \      ELSE 0\n    END AS avg_monthly_revenue\n  FROM DealerPulse.INFORMATION_MART.vw_sales_per_product_category\n  WHERE PRODUCT_CATEGORY IS NOT NULL AND TOTAL_REVENUE IS NOT NULL\n\
    \  GROUP BY PRODUCT_CATEGORY\n),\ncategory_stats AS (\n  SELECT\n    *,\n    AVG(total_revenue) OVER () AS company_avg_category_revenue\n\
    \  FROM category_metrics\n)\nSELECT\n  PRODUCT_CATEGORY,\n  total_revenue,\n  total_quantity,\n  num_dealers,\n  ROUND(avg_monthly_revenue, 2) AS avg_monthly_revenue,\n\
    \  ROUND(100.0 * total_revenue / SUM(total_revenue) OVER (), 2) AS category_share_pct,\n  CASE\n    WHEN total_revenue < company_avg_category_revenue * 0.8 AND sample_count > 3 THEN 'DECLINING_CRITICAL'\n\
    \    WHEN total_revenue < company_avg_category_revenue * 0.95 AND sample_count > 2 THEN 'DECLINING'\n    WHEN total_revenue BETWEEN company_avg_category_revenue * 0.95 AND company_avg_category_revenue * 1.05 THEN 'FLAT'\n\
    \    ELSE 'GROWING'\n  END AS revenue_trend\nFROM category_stats\nWHERE total_revenue < company_avg_category_revenue * 1.05\nORDER BY total_revenue DESC"
- name: units_sold_by_dealer
  question: How many units were sold by each dealer? Units sold per dealer. Sales volume by dealer.
  use_as_onboarding_question: false
  sql: "WITH units_agg AS (\n  SELECT\n    DEALER_NAME,\n    SUM(COALESCE(UNITS_SOLD, 0)) AS total_units_sold,\n    COUNT(DISTINCT PERIOD_YEAR) AS distinct_years,\n\
    \    COUNT(DISTINCT PERIOD_MONTH) AS distinct_months\n  FROM DealerPulse.INFORMATION_MART.vw_sales_volume\n  WHERE UNITS_SOLD IS NOT NULL\n  GROUP BY DEALER_NAME\n\
    )\nSELECT\n  DEALER_NAME,\n  total_units_sold AS TOTAL_UNITS_SOLD,\n  ROUND(100.0 * total_units_sold / SUM(total_units_sold) OVER (), 2) AS units_share_pct,\n\
    \  CASE\n    WHEN distinct_months > 0 THEN ROUND(CAST(total_units_sold AS FLOAT) / distinct_months, 1)\n    ELSE CAST(total_units_sold AS FLOAT)\n\
    \  END AS avg_monthly_units\nFROM units_agg\nWHERE total_units_sold > 0\nORDER BY total_units_sold DESC"
- name: dealer_cost_reduction_opportunities
  question: Suggest ways to improve dealer profitability based on current metrics.
  sql: "WITH bottom_10_dealers AS (\n  SELECT TOP 10 DEALER_NAME, GROSS_PROFIT_MARGIN_PCT\n  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n\
    \  ORDER BY GROSS_PROFIT_MARGIN_PCT ASC\n)\nSELECT\n  b.DEALER_NAME,\n  b.GROSS_PROFIT_MARGIN_PCT,\n  CASE\n    WHEN b.GROSS_PROFIT_MARGIN_PCT < 15 THEN '1_Improve_Margins - Margin below 15%'\n\
    \    WHEN cc.CCC > 60 THEN '2_Optimize_CCC - CCC above 60 days'\n    WHEN cc.DIO > 45 THEN '3_Reduce_Inventory - High inventory days'\n\
    \    WHEN bo.BACKORDER_INCIDENCE_PCT > 15 THEN '4_Improve_Availability - High backorder rate'\n    WHEN l.AVG_ORDER_LEAD_TIME_DAYS > 7 THEN '5_Speed_Delivery - Long lead times'\n\
    \    ELSE '6_Maintain_Performance'\n  END as PRIMARY_OPPORTUNITY\nFROM bottom_10_dealers b\nLEFT JOIN DealerPulse.INFORMATION_MART.vw_cash_conversion_cycle cc\n\
    \  ON b.DEALER_NAME = cc.DEALER_NAME\nLEFT JOIN DealerPulse.INFORMATION_MART.vw_backorder_incidence bo\n  ON b.DEALER_NAME = bo.DEALER_NAME\nLEFT JOIN DealerPulse.INFORMATION_MART.vw_order_lead_time l\n\
    \  ON b.DEALER_NAME = l.DEALER_NAME\nORDER BY b.GROSS_PROFIT_MARGIN_PCT ASC"
- name: increase_dealer_profit_analysis
  question: How can we increase dealer profit? What strategies can improve dealer profitability?
  sql: "WITH margin_data AS (\n  SELECT\n    DEALER_NAME,\n    ROUND(AVG(CONTRIBUTION_MARGIN_PCT), 2) as avg_contribution_margin_pct\n\
    \  FROM DealerPulse.INFORMATION_MART.vw_dealer_contribution_margin\n  WHERE CONTRIBUTION_MARGIN_PCT IS NOT NULL\n  GROUP BY DEALER_NAME\n\
    ),\nefficiency_data AS (\n  SELECT\n    DEALER_NAME,\n    ROUND(AVG(AVG_TURNAROUND_HOURS), 1) as avg_repair_hours,\n    CASE\n\
    \      WHEN AVG(AVG_TURNAROUND_HOURS) <= 24 THEN 'VERY_FAST'\n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 48 THEN 'FAST'\n\
    \      WHEN AVG(AVG_TURNAROUND_HOURS) <= 72 THEN 'MODERATE'\n      ELSE 'SLOW'\n    END as efficiency_rating\n  FROM DealerPulse.INFORMATION_MART.vw_average_repair_turnaround_time\n\
    \  WHERE AVG_TURNAROUND_HOURS IS NOT NULL\n  GROUP BY DEALER_NAME\n)\nSELECT\n  m.DEALER_NAME,\n  m.avg_contribution_margin_pct,\n  e.avg_repair_hours,\n\
    \  e.efficiency_rating,\n  CASE\n    WHEN m.avg_contribution_margin_pct >= 20 AND e.avg_repair_hours <= 48 THEN 'EXCELLENT - High Margin + Fast Service'\n\
    \    WHEN m.avg_contribution_margin_pct >= 20 THEN 'OPPORTUNITY - High Margin, Slow Service'\n    WHEN m.avg_contribution_margin_pct < 15 AND e.avg_repair_hours <= 48 THEN 'OPPORTUNITY - Good Service, Low Margin'\n\
    \    WHEN m.avg_contribution_margin_pct < 15 THEN 'CRITICAL - Low Margin + Slow Service'\n    ELSE 'FAIR - Medium performance'\n  END as profit_improvement_strategy\n\
    FROM margin_data m\nLEFT JOIN efficiency_data e\n  ON m.DEALER_NAME = e.DEALER_NAME\nORDER BY m.avg_contribution_margin_pct DESC, e.avg_repair_hours ASC"
- name: dealer_health_scorecard
  question: Tell me about dealer health. What is the dealer health status? Overall dealer health. Health scorecard.
  use_as_onboarding_question: true
  sql: "WITH profitability AS (\n  SELECT\n    DEALER_NAME,\n    GROSS_PROFIT_MARGIN_PCT,\n    CASE\n      WHEN GROSS_PROFIT_MARGIN_PCT >= 20 THEN 'EXCELLENT'\n\
    \      WHEN GROSS_PROFIT_MARGIN_PCT >= 15 THEN 'GOOD'\n      WHEN GROSS_PROFIT_MARGIN_PCT >= 10 THEN 'WARNING'\n      ELSE 'CRITICAL'\n    END as profit_status\n\
    \  FROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin\n),\ngrowth_trend AS (\n  SELECT\n    DEALER_NAME,\n    AVG(REVENUE_GROWTH_MOM_PERCENT) as avg_growth,\n\
    \    CASE\n      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > 10 THEN 'STRONG'\n      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > 5 THEN 'GROWING'\n\
    \      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > 0 THEN 'STABLE'\n      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > -5 THEN 'DECLINING'\n      ELSE 'CRITICAL'\n\
    \    END as revenue_status\n  FROM DealerPulse.INFORMATION_MART.vw_dealer_revenue_growth\n  WHERE REVENUE_GROWTH_MOM_PERCENT IS NOT NULL\n  GROUP BY DEALER_NAME\n\
    ),\noperational_eff AS (\n  SELECT\n    DEALER_NAME,\n    AVG(AVG_TURNAROUND_HOURS) as avg_turnaround,\n    CASE\n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 24 THEN 'EXCELLENT'\n\
    \      WHEN AVG(AVG_TURNAROUND_HOURS) <= 48 THEN 'GOOD'\n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 72 THEN 'FAIR'\n      ELSE 'CRITICAL'\n    END as efficiency_status\n\
    \  FROM DealerPulse.INFORMATION_MART.vw_average_repair_turnaround_time\n  WHERE AVG_TURNAROUND_HOURS IS NOT NULL\n  GROUP BY DEALER_NAME\n),\n\
    inventory_status_agg AS (\n  SELECT\n    DEALER_NAME,\n    AVG(STOCK_AVAILABILITY_PCT) as avg_stock,\n    CASE\n      WHEN AVG(STOCK_AVAILABILITY_PCT) >= 95 THEN 'EXCELLENT'\n\
    \      WHEN AVG(STOCK_AVAILABILITY_PCT) >= 85 THEN 'GOOD'\n      WHEN AVG(STOCK_AVAILABILITY_PCT) >= 75 THEN 'WARNING'\n      ELSE 'CRITICAL'\n    END as inventory_status\n\
    \  FROM DealerPulse.INFORMATION_MART.vw_stock_availability_dealer\n  WHERE STOCK_AVAILABILITY_PCT IS NOT NULL\n  GROUP BY DEALER_NAME\n),\n\
    cash_status_agg AS (\n  SELECT\n    DEALER_NAME,\n    CCC,\n    CASE\n      WHEN CCC < 30 THEN 'GOOD'\n      WHEN CCC < 45 THEN 'NORMAL'\n\
    \      WHEN CCC < 60 THEN 'WARNING'\n      ELSE 'CRITICAL'\n    END as cash_health\n  FROM DealerPulse.INFORMATION_MART.vw_cash_conversion_cycle\n)\n\
    SELECT\n  p.DEALER_NAME,\n  COALESCE(g.revenue_status, 'UNKNOWN') as REVENUE_STATUS,\n  COALESCE(p.profit_status, 'UNKNOWN') as PROFITABILITY,\n\
    \  COALESCE(o.efficiency_status, 'UNKNOWN') as OPERATIONAL_EFFICIENCY,\n  COALESCE(i.inventory_status, 'UNKNOWN') as INVENTORY_HEALTH,\n\
    \  COALESCE(c.cash_health, 'UNKNOWN') as CASH_HEALTH,\n  CASE\n    WHEN COALESCE(g.revenue_status, 'UNKNOWN') = 'CRITICAL' OR\n         COALESCE(p.profit_status, 'UNKNOWN') = 'CRITICAL' OR\n\
    \         COALESCE(o.efficiency_status, 'UNKNOWN') = 'CRITICAL' OR\n         COALESCE(i.inventory_status, 'UNKNOWN') = 'CRITICAL' OR\n\
    \         COALESCE(c.cash_health, 'UNKNOWN') = 'CRITICAL' THEN 20\n    WHEN COALESCE(p.profit_status, 'UNKNOWN') = 'WARNING' OR\n\
    \         COALESCE(i.inventory_status, 'UNKNOWN') = 'WARNING' THEN 50\n    WHEN COALESCE(p.profit_status, 'UNKNOWN') = 'GOOD' AND\n\
    \         COALESCE(g.revenue_status, 'UNKNOWN') IN ('STRONG', 'GROWING') THEN 85\n    WHEN COALESCE(p.profit_status, 'UNKNOWN') = 'EXCELLENT' THEN 90\n\
    \    ELSE 70\n  END as OVERALL_HEALTH_SCORE\nFROM profitability p\nLEFT JOIN growth_trend g ON p.DEALER_NAME = g.DEALER_NAME\nLEFT JOIN operational_eff o ON p.DEALER_NAME = o.DEALER_NAME\n\
    LEFT JOIN inventory_status_agg i ON p.DEALER_NAME = i.DEALER_NAME\nLEFT JOIN cash_status_agg c ON p.DEALER_NAME = c.DEALER_NAME\nORDER BY OVERALL_HEALTH_SCORE DESC"
- name: gross_profit_margin_test_overview
  question: Show me gross profit margin test. Gross Profit Margin Test overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.TOTAL_REVENUE), 2) AS TOTAL_REVENUE,\n  ROUND(SUM(dl.TOTAL_COGS), 2) AS TOTAL_COGS,\n\
    \  ROUND(AVG(dl.GROSS_PROFIT_MARGIN_PCT), 2) AS GROSS_PROFIT_MARGIN_PCT\nFROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin_test dl\n\
    GROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: average_repair_turnaround_time_overview
  question: Show me average repair turnaround time. Average Repair Turnaround Time overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(AVG(dl.AVG_TURNAROUND_HOURS), 2) AS AVG_TURNAROUND_HOURS,\n  ROUND(SUM(dl.SERVICE_ORDERS_COUNT), 2) AS SERVICE_ORDERS_COUNT\n\
    FROM DealerPulse.INFORMATION_MART.vw_average_repair_turnaround_time dl\nGROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: backorder_incidence_overview
  question: Show me backorder incidence. Backorder Incidence overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(AVG(dl.BACKORDER_INCIDENCE_PCT), 2) AS BACKORDER_INCIDENCE_PCT,\n  ROUND(SUM(dl.TOTAL_ORDER_ITEMS), 2) AS TOTAL_ORDER_ITEMS,\n\
    \  ROUND(SUM(dl.BACKORDERED_ITEMS), 2) AS BACKORDERED_ITEMS\nFROM DealerPulse.INFORMATION_MART.vw_backorder_incidence dl\n\
    GROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: cash_conversion_cycle_overview
  question: Show me cash conversion cycle. Cash Conversion Cycle overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(AVG(dl.DSO), 2) AS DSO,\n  ROUND(AVG(dl.DIO), 2) AS DIO,\n  ROUND(AVG(dl.DPO), 2) AS DPO,\n\
    \  ROUND(AVG(dl.CCC), 2) AS CCC\nFROM DealerPulse.INFORMATION_MART.vw_cash_conversion_cycle dl\nGROUP BY dl.DEALER_NAME\n\
    ORDER BY dl.DEALER_NAME"
- name: dealer_contribution_margin_overview
  question: Show me dealer contribution margin. Dealer Contribution Margin overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.REVENUE_AMT), 2) AS REVENUE_AMT,\n  ROUND(SUM(dl.DIRECT_COSTS_AMT), 2) AS DIRECT_COSTS_AMT,\n\
    \  ROUND(SUM(dl.ALLOCATED_COSTS_AMT), 2) AS ALLOCATED_COSTS_AMT,\n  ROUND(AVG(dl.CONTRIBUTION_MARGIN_PCT), 2) AS CONTRIBUTION_MARGIN_PCT\n\
    FROM DealerPulse.INFORMATION_MART.vw_dealer_contribution_margin dl\nGROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: dealer_journey_counts_overview
  question: Show me dealer journey counts. Dealer Journey Counts overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.TOTAL_ORDERS), 2) AS TOTAL_ORDERS,\n  ROUND(SUM(dl.ORDER_COUNT), 2) AS ORDER_COUNT,\n\
    \  ROUND(SUM(dl.DELIVERY_COUNT), 2) AS DELIVERY_COUNT,\n  ROUND(SUM(dl.INVOICE_COUNT), 2) AS INVOICE_COUNT,\n  ROUND(SUM(dl.PAID_COUNT), 2) AS PAID_COUNT,\n\
    \  ROUND(SUM(dl.WARRANTY_COUNT), 2) AS WARRANTY_COUNT,\n  ROUND(AVG(dl.AVG_LEAD_TIME_DAYS), 2) AS AVG_LEAD_TIME_DAYS,\n  ROUND(SUM(dl.ACTIVE_WARRANTY_COUNT), 2) AS ACTIVE_WARRANTY_COUNT,\n\
    \  ROUND(SUM(dl.EXPIRED_WARRANTY_COUNT), 2) AS EXPIRED_WARRANTY_COUNT\nFROM DealerPulse.INFORMATION_MART.vw_dealer_journey_counts dl\n\
    GROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: dealer_revenue_growth_overview
  question: Show me dealer revenue growth. Dealer Revenue Growth overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.REVENUE), 2) AS REVENUE,\n  ROUND(SUM(dl.PREV_MONTH_REVENUE), 2) AS PREV_MONTH_REVENUE,\n\
    \  ROUND(AVG(dl.REVENUE_GROWTH_MOM_PERCENT), 2) AS REVENUE_GROWTH_MOM_PERCENT\nFROM DealerPulse.INFORMATION_MART.vw_dealer_revenue_growth dl\n\
    GROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: gross_profit_margin_overview
  question: Show me gross profit margin. Gross Profit Margin overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.TOTAL_REVENUE), 2) AS TOTAL_REVENUE,\n  ROUND(SUM(dl.TOTAL_COGS), 2) AS TOTAL_COGS,\n\
    \  ROUND(AVG(dl.GROSS_PROFIT_MARGIN_PCT), 2) AS GROSS_PROFIT_MARGIN_PCT\nFROM DealerPulse.INFORMATION_MART.vw_gross_profit_margin dl\n\
    GROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: order_lead_time_overview
  question: Show me order lead time. Order Lead Time overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(AVG(dl.AVG_ORDER_LEAD_TIME_DAYS), 2) AS AVG_ORDER_LEAD_TIME_DAYS,\n  ROUND(SUM(dl.ORDERS_COUNT), 2) AS ORDERS_COUNT\n\
    FROM DealerPulse.INFORMATION_MART.vw_order_lead_time dl\nGROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: sales_per_product_category_overview
  question: Show me sales per product category. Sales Per Product Category overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  dl.PRODUCT_CATEGORY,\n  ROUND(SUM(dl.TOTAL_REVENUE), 2) AS TOTAL_REVENUE,\n  ROUND(SUM(dl.TOTAL_QUANTITY), 2) AS TOTAL_QUANTITY\n\
    FROM DealerPulse.INFORMATION_MART.vw_sales_per_product_category dl\nGROUP BY dl.DEALER_NAME, dl.PRODUCT_CATEGORY\n\
    ORDER BY dl.DEALER_NAME"
- name: sales_volume_overview
  question: Show me sales volume. Sales Volume overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.UNITS_SOLD), 2) AS UNITS_SOLD\nFROM DealerPulse.INFORMATION_MART.vw_sales_volume dl\n\
    GROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME"
- name: stock_availability_dealer_overview
  question: Show me stock availability dealer. Stock Availability Dealer overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  dl.PRODUCT_CATEGORY,\n  ROUND(SUM(dl.ON_HAND_STOCK), 2) AS ON_HAND_STOCK,\n  ROUND(SUM(dl.RESERVED_STOCK), 2) AS RESERVED_STOCK,\n\
    \  ROUND(SUM(dl.TOTAL_DEMAND), 2) AS TOTAL_DEMAND,\n  ROUND(AVG(dl.STOCK_AVAILABILITY_PCT), 2) AS STOCK_AVAILABILITY_PCT\n\
    FROM DealerPulse.INFORMATION_MART.vw_stock_availability_dealer dl\nGROUP BY dl.DEALER_NAME, dl.PRODUCT_CATEGORY\nORDER BY dl.DEALER_NAME"
- name: transaction_lineage_overview
  question: Show me transaction lineage. Transaction Lineage overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.TRANSACTION_ID,\n  dl.DEALER_NAME,\n  dl.CITY,\n  dl.COUNTRY,\n  dl.REGION,\n  dl.PRODUCT_CATEGORY,\n\
    \  dl.PRODUCT_DESC,\n  dl.ORDER_FLAG,\n  dl.DELIVERY_FLAG,\n  dl.INVOICE_FLAG,\n  dl.PAID_FLAG,\n  dl.INVOICE_STATUS,\n\
    \  dl.WARRANTY_FLAG,\n  dl.WARRANTY_STATUS,\n  ROUND(SUM(dl.LEAD_TIME_DAYS), 2) AS LEAD_TIME_DAYS,\n  ROUND(SUM(dl.INVOICE_AMOUNT), 2) AS INVOICE_AMOUNT\n\
    FROM DealerPulse.INFORMATION_MART.vw_transaction_lineage dl\nGROUP BY dl.TRANSACTION_ID, dl.DEALER_NAME, dl.CITY, dl.COUNTRY, dl.REGION,\n\
    \  dl.PRODUCT_CATEGORY, dl.PRODUCT_DESC, dl.ORDER_FLAG, dl.DELIVERY_FLAG, dl.INVOICE_FLAG,\n  dl.PAID_FLAG, dl.INVOICE_STATUS, dl.WARRANTY_FLAG, dl.WARRANTY_STATUS\n\
    ORDER BY dl.TRANSACTION_ID"