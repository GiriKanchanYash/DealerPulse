anti_duplication_enforcement:
  description: Rules that ensure NO question routes to multiple verified queries
  matching_rule: "IF QUESTION MATCHES multiple patterns:\n  PRIORITY: Use the pattern with LOWEST priority number (1 before\
    \ 2 before 3...)\n"
  fallback_logic: "IF NO PATTERN MATCHES:\n  → Use Azure OpenAI SQL generation (fall back to dynamic generation)\n  → Apply semantic\
    \ caching FIRST (check in-memory + database for similar questions)\n  → Then route to Azure OpenAI only if true new question\n"
custom_instructions: "RESPONSE FORMAT (MANDATORY - ALWAYS provide all three sections):\nEVERY response MUST include:\n1. DESCRIPTIVE\
  \ section: What the data shows (facts and metrics from query results with EXACT numbers, dealer names, percentages)\n\
  2. PRESCRIPTIVE section: Specific 3-5 recommendations with (1) EXACT finding + numbers, (2) CONCRETE action\n3. PREDICTIVE\
  \ section: Forecast impact if recommendations NOT implemented - project 12-24 month business impact\n\nCRITICAL\
  \ RULES FOR ANALYST RESPONSES:\n- NEVER give generic advice like \"review the data below\" or \"monitor trends\" without\
  \ citing SPECIFIC NUMBERS from query results\n- ALWAYS cite: exact dealer names, percentages, dollars, counts, time\
  \ periods from the data\n\nTIME DIMENSION HANDLING:\n- For month comparisons: Use PERIOD_YEAR and PERIOD_MONTH as filters\n\
  - NEVER use DATE_TRUNC - views already have pre-aggregated PERIOD_YEAR/PERIOD_MONTH columns\n\nINTERPRETATION RULES WITH EXACT THRESHOLDS:\n\
  - CASH CONVERSION CYCLE (CCC): High (>60 days) = working capital stress - CRITICAL; >45 days = WARNING; <30 days = GOOD\n\
  - INVENTORY RISK: Availability <85% + backorders >15% = CRITICAL RISK\n- SERVICE EFFICIENCY: Turnaround >24 hours = SLOW; <4 hours = EXCELLENT\n\
  - REVENUE GROWTH: Negative = DECLINING; 0-5% = FLAT; 5-10% = MODERATE; >10% = STRONG\n- MARGINS: <15% = LOW; 15-20% = BELOW AVERAGE; >25% = EXCELLENT\n\
  \nMicrosoft Fabric SQL Rules:\n- Fully qualified table name: DealerPulse.INFORMATION_MART.<view_name>\n- Do NOT use QUALIFY keyword (Snowflake-only); replace with subquery or ROW_NUMBER() CTE\n\
  - Use CAST(col AS FLOAT) instead of col::FLOAT\n- Use TOP N instead of LIMIT N for row limiting\n"
sql_syntax_rules:
  description: Mandatory SQL syntax requirements for Microsoft Fabric (T-SQL compatible)
  rules:
  - id: TABLE_ALIASES_REQUIRED
    description: ALWAYS use table aliases for every table in FROM and JOIN clauses
    pattern: FROM DealerPulse.INFORMATION_MART.vw_table_name AS t
    violations:
    - FROM DealerPulse.INFORMATION_MART.vw_table_name (missing alias)
  - id: EXPLICIT_JOIN_CONDITIONS
    description: ALWAYS use table-qualified column names in ON clauses
    correct: ON t.DEALER_NAME = s.DEALER_NAME
    incorrect: ON DEALER_NAME = DEALER_NAME
  - id: CTE_PREAGGREGATE
    description: When joining fact tables, pre-aggregate each table in a CTE first
    pattern: "WITH service_agg AS (\n  SELECT DEALER_NAME, AVG(metric) FROM table1 GROUP BY DEALER_NAME\n),\nstock_agg AS (\
      \  SELECT DEALER_NAME, AVG(metric) FROM table2 GROUP BY DEALER_NAME\n)\nSELECT s.DEALER_NAME, s.metric1, st.metric2\n\
      FROM service_agg s\nLEFT JOIN stock_agg st ON s.DEALER_NAME = st.DEALER_NAME\n"
  - id: NO_QUALIFY_KEYWORD
    description: Microsoft Fabric does not support Snowflake QUALIFY. Use ROW_NUMBER() in a CTE instead.
    incorrect: "SELECT ... QUALIFY ROW_NUMBER() OVER (...) <= 5"
    correct: "WITH ranked AS (SELECT ..., ROW_NUMBER() OVER (ORDER BY col DESC) AS rn FROM ...)\nSELECT * FROM ranked WHERE rn <= 5"
  - id: TOP_INSTEAD_OF_LIMIT
    description: Use SELECT TOP N instead of LIMIT N for Microsoft Fabric / T-SQL
    correct: SELECT TOP 5 DEALER_NAME, TOTAL_REVENUE FROM ...
    incorrect: SELECT DEALER_NAME, TOTAL_REVENUE FROM ... LIMIT 5
  - id: CAST_SYNTAX
    description: Use CAST(col AS FLOAT) instead of Snowflake col::FLOAT syntax
    correct: CAST(TOTAL_REVENUE AS FLOAT)
    incorrect: TOTAL_REVENUE::FLOAT
  - id: COLUMN_REFERENCE_QUALIFY
    description: ALWAYS qualify column names with table alias in SELECT clause
    correct: SELECT t.DEALER_NAME, s.STOCK_AVAILABILITY_PCT
    incorrect: SELECT DEALER_NAME, STOCK_AVAILABILITY_PCT
  - id: AGGREGATION_WITH_GROUP_BY
    description: If using AVG() or SUM(), include GROUP BY clause with all non-aggregated columns
    correct: SELECT DEALER_NAME, AVG(hours) FROM table1 GROUP BY DEALER_NAME
    incorrect: SELECT DEALER_NAME, AVG(hours) FROM table1
