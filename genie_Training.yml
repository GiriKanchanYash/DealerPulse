model_quality_warnings: "⚠️ CRITICAL WARNINGS FOR Open AI ANALYST - READ CAREFULLY\n\nVIEW NAMES vs COLUMN NAMES (MOST IMPORTANT):\n\
  - Names like VW_DEALER_CONTRIBUTION_MARGIN, VW_GROSS_PROFIT_MARGIN are TABLE/VIEW names. Use them ONLY in FROM and JOIN\
  \ (e.g. FROM DEALER.INFORMATION_MART.VW_DEALER_CONTRIBUTION_MARGIN cm).\n- COLUMNS are the attributes defined in dimensions\
  \ and facts for each view (e.g. DEALER_NAME, CONTRIBUTION_MARGIN_PCT, GROSS_PROFIT_MARGIN_PCT). Use these in SELECT, WHERE,\
  \ ORDER BY with an alias (e.g. cm.DEALER_NAME, cm.CONTRIBUTION_MARGIN_PCT).\n- NEVER use a view name as a column. Writing\
  \ t.VW_DEALER_CONTRIBUTION_MARGIN or alias.VW_GROSS_PROFIT_MARGIN is INVALID and causes \"invalid identifier\" errors. Only\
  \ the actual column names (DEALER_NAME, CONTRIBUTION_MARGIN_PCT, etc.) are valid.\n\nCortex has been generating SQL with\
  \ these common errors. Every generated query MUST be validated for:\n\n1. AMBIGUOUS JOINS - Cortex generates: ON DEALER_NAME\
  \ = DEALER_NAME (WRONG)\n  Fix: Always use explicit table aliases: ON t.DEALER_NAME = s.DEALER_NAME ✓\n\n2. MISSING TABLE\
  \ ALIASES - Cortex generates: SELECT DEALER_NAME, AVG_TURNAROUND_HOURS (WRONG)\n  Fix: Always qualify columns: SELECT t.DEALER_NAME,\
  \ s.AVG_TURNAROUND_HOURS ✓\n\n3. NO CTE PREAGGREGATE - Cortex generates joins without pre-aggregation (WRONG)\n  Fix: Create\
  \ CTEs with GROUP BY first, then join: WITH agg1 AS (SELECT ... GROUP BY DEALER_NAME) ✓\n\n4. DUPLICATE COLUMNS - Cortex\
  \ selects same column multiple times (WRONG)\n  Fix: Select only once with proper alias: SELECT t.DEALER_NAME (not DEALER_NAME\
  \ twice)\n\nIf ANY generated SQL contains these patterns, REJECT IT and demand a corrected version with:\n- Table aliases\
  \ on every table (t, s, b, o, c, m, etc.)\n- Explicit ON clause with qualified columns (ON t.col = s.col)\n- CTEs for pre-aggregation\
  \ when joining fact tables\n- No ambiguous column references\n"
