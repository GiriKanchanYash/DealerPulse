cortex_optimization:
  description: Performance tuning for Cortex Analyst to reduce response time and improve SQL quality
  performance_tips:
  - ALWAYS use LIMIT clause when exploring data - add LIMIT 100 or LIMIT 1000 to prevent full table scans
  - PRE-AGGREGATE first in CTEs before joining - this reduces join cardinality and speeds execution
  - 'Use indexed columns: DEALER_NAME, PERIOD_YEAR, PERIOD_MONTH are indexed and should be in WHERE clauses'
  - Avoid SELECT * - always explicitly select only needed columns to reduce data transfer
  - Use LEFT JOIN not INNER JOIN to preserve dealer records even with missing data
  - Filter by PERIOD_YEAR/PERIOD_MONTH early in CTEs to reduce rows processed
  - 'Push filters down: WHERE clauses in CTEs are faster than HAVING clauses'
