  - id: TABLE_ALIASES_REQUIRED
    description: ALWAYS use table aliases for every table in FROM and JOIN clauses
    pattern: FROM DEALER.INFORMATION_MART.VW_TABLE_NAME AS t
    violations:
    - FROM DEALER.INFORMATION_MART.VW_TABLE_NAME (missing alias)
  - id: EXPLICIT_JOIN_CONDITIONS
    description: ALWAYS use table-qualified column names in ON clauses
    correct: ON t.DEALER_NAME = s.DEALER_NAME
    incorrect: ON DEALER_NAME = DEALER_NAME
    reason: Without table qualifiers, SQL cannot determine which table's column to use
  - id: CTE_PREAGGREGATE
    description: When joining fact tables, pre-aggregate each table in a CTE first
    pattern: "WITH service_agg AS (\n  REVENUE_GROWTH_MOM_PERCENT > 15 THEN 'STRONG, AVG(metric) FROM table1 GROUP BY DEALER_NAME\n\
      ),\nstock_agg AS (\n  SELECT DEALER_NAME, AVG(metric) FROM table2 GROUP BY DEALER_NAME\n)\nSELECT s.DEALER_NAME, s.metric1,\
      \ st.metric2\nFROM service_agg s\nLEFT JOIN stock_agg st ON s.DEALER_NAME = st.DEALER_NAME\n"
    reason: Pre-aggregation prevents GROUP BY errors and ensures correct results
  - id: COLUMN_REFERENCE_QUALIFY
    description: ALWAYS qualify column names with table alias in SELECT clause
    correct: SELECT t.DEALER_NAME, s.STOCK_AVAILABILITY_PCT
    incorrect: SELECT DEALER_NAME, STOCK_AVAILABILITY_PCT
    reason: Without qualifiers, SQL errors occur if column name is ambiguous
  - id: NO_DUPLICATE_JOINS
    description: Do NOT join two tables on the same condition twice
    incorrect: FROM t JOIN s ON t.id = s.id JOIN s ON t.id = s.id
    correct: FROM t JOIN s ON t.id = s.id
  - id: AGGREGATION_WITH_GROUP_BY
    description: If using AVG() or SUM(), include GROUP BY clause with all non-aggregated columns
    correct: SELECT DEALER_NAME, AVG(hours) FROM table1 GROUP BY DEALER_NAME
    incorrect: SELECT DEALER_NAME, AVG(hours) FROM table1
    reason: SQL requires all non-aggregated columns to be in GROUP BY clause
fast_path_query_routing:
  description: Bypass Cortex for common questions - use pre-built verified queries for 10x faster responses
  when_to_use_fast_path:
  - If user asks about TOP dealers, profitability, growth, inventory, or service metrics - CHECK VERIFIED QUERIES FIRST
  - If user's question matches any trigger phrase in cortex_training_patterns - USE THAT PRE-BUILT QUERY
  - If exact question has been asked before - CACHE THE RESULT for instant response
  - If Cortex response takes >20 seconds - FALL BACK to fast path query
  query_routing_examples:
  - question: Who are my top dealers?
    fast_path_query: top_5_dealers_by_revenue
    response_time: <3 seconds
    why_fast: Pre-tested, single table, LIMIT 5
  - question: Which dealers have low profit margins?
    fast_path_query: dealers_losing_money
    response_time: <5 seconds
    why_fast: Pre-tested, single table, WHERE clause on indexed column
  - question: Show dealer service efficiency
    fast_path_query: compare_service_efficiency_across_dealers
    response_time: <8 seconds
    why_fast: Pre-built CTEs, tested joins, cached results
  - question: What is inventory status by dealer?
    fast_path_query: dealer_inventory_health
    response_time: <5 seconds
    why_fast: Pre-built stock + backorder aggregation
  - question: Which dealers are declining?
    fast_path_query: high_growth_dealers (with WHERE growth < 0)
    response_time: <5 seconds
    why_fast: Pre-aggregated revenue data
  cortex_only_for:
  - Ad-hoc analytical questions not in verified_queries
  - Complex what-if scenario analysis
  - Root cause analysis requiring custom logic
  - Questions involving multiple views not pre-joined
  performance_expectations:
    pre_built_queries: <5 seconds average
    cortex_generated: 10-30 seconds average
    cortex_with_cache: <15 seconds average
query_caching_strategy:
