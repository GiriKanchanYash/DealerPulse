anti_duplication_enforcement:
  description: Rules that ensure NO question routes to multiple verified queries
  violations_fixed:
  - issue: declining appears in p5_growth_trends AND old pattern_5_growth
    fix: MERGED into p5_growth_trends. Single query for all growth/decline.
  - issue: inventory triggers in both p3_service_efficiency AND p4_inventory_health
    fix: 'CLARIFIED: p3 includes stock availability (part of service). p4 for inventory-ONLY questions. Service has priority
      3 < inventory priority 4.'
  - issue: profitability in pattern_2 AND pattern_7 AND pattern_8
    fix: 'CONSOLIDATED: p2_profitability_analysis (root cause), p2_increase_profit (levers), p2_cost_reduction (opportunities).
      Clear intent distinction.'
  - issue: categories vs dealers (product_level vs dealer_level confusion)
    fix: 'KEYWORD DISTINCTION: ''product category'' or ''category'' keyword → p6 (product level). ''dealers'' alone → p5 (dealer
      level).'
  matching_rule: "IF QUESTION MATCHES multiple patterns:\n  PRIORITY: Use the pattern with LOWEST priority number (1 before\
    \ 2 before 3...)\n  EXAMPLE: \"Show dealer health & top performers\"\n    - Matches p1_dealer_health (priority 1)\n  \
    \  - Matches p1_top_dealers (priority 1 tie)\n    - Both are priority 1 → use p1_dealer_health (more comprehensive)\n"
  fallback_logic: "IF NO PATTERN MATCHES:\n  → Use Cortex SQL generation (fall back to dynamic Cortex)\n  → Apply semantic\
    \ caching FIRST (check in-memory + database for similar questions)\n  → Then route to Cortex only if true new question\n"
semantic_matching_integration:
  description: After pattern matching determines WHAT query to use, apply semantic matching to avoid duplicates
  workflow: "STEP 1: Pattern Match → identifies verified_query (e.g. dealer_profitability_analysis)\nSTEP 2: Semantic Match\
    \ → checks if SIMILAR question was asked before\nSTEP 3: Cache Hit → if found, return cached response without inserting\
    \ new history entry\nSTEP 4: New Question → if not found, execute verified_query and insert into history\n\nRESULT: Multiple\
    \ similar questions (\"What is profit?\" vs \"Show profitability?\") route to same query\n        AND reuse the cached\
    \ response without creating duplicate history entries\n"
  sql_generation_rules_for_speed:
  - 'RULE 1: For any multi-table query, ALWAYS use CTEs with pre-aggregation - this is faster than subqueries'
  - 'RULE 2: Keep CTEs simple - each CTE should do ONE aggregation (AVG, SUM, COUNT, etc)'
  - 'RULE 3: JOIN CTEs on indexed columns only (DEALER_NAME is primary join key)'
  - 'RULE 4: Add LIMIT 100-1000 to prevent scanning entire tables'
  - 'RULE 5: Avoid complex window functions - use simple aggregates instead'
  - 'RULE 6: Use ROUND() to reduce decimal precision - faster than unrounded'
  - 'RULE 7: Never use CASE statements in GROUP BY - pre-compute in CTE instead'
  - 'RULE 8: Filter early - WHERE clauses in CTEs before aggregation'
  expert_sql_attributes:
  - 'Know ALL 7 main tables: VW_GROSS_PROFIT_MARGIN (DEALER_NAME, TOTAL_REVENUE, TOTAL_COGS, GROSS_PROFIT_MARGIN_PCT, PERIOD_YEAR,
    PERIOD_MONTH)'
  - 'Know service & fulfillment: VW_AVERAGE_REPAIR_TURNAROUND_TIME (DEALER_NAME, AVG_TURNAROUND_HOURS, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know order fulfillment: VW_ORDER_LEAD_TIME (DEALER_NAME, AVG_ORDER_LEAD_TIME_DAYS, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know inventory: VW_STOCK_AVAILABILITY_DEALER (DEALER_NAME, PRODUCT_CATEGORY, STOCK_AVAILABILITY_PCT, ON_HAND_STOCK, RESERVED_STOCK,
    TOTAL_DEMAND, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know backorders: VW_BACKORDER_INCIDENCE (DEALER_NAME, BACKORDER_INCIDENCE_PCT, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know cash metrics: VW_CASH_CONVERSION_CYCLE (DEALER_NAME, CCC, DSO, DIO, DPO, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know growth: VW_DEALER_REVENUE_GROWTH (DEALER_NAME, REVENUE, PREV_MONTH_REVENUE, REVENUE_GROWTH_MOM_PERCENT, PERIOD_YEAR,
    PERIOD_MONTH)'
  - 'Know contribution: VW_DEALER_CONTRIBUTION_MARGIN (DEALER_NAME, CONTRIBUTION_MARGIN_PCT, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know sales detail: VW_SALES_PER_PRODUCT_CATEGORY (DEALER_NAME, PRODUCT_CATEGORY, TOTAL_REVENUE, TOTAL_QUANTITY, PERIOD_YEAR,
    PERIOD_MONTH)'
  - 'Know volume: VW_SALES_VOLUME (DEALER_NAME, UNITS_SOLD, PERIOD_YEAR, PERIOD_MONTH)'
  - 'Know column relationships: DEALER_NAME is universal join key; PERIOD_YEAR, PERIOD_MONTH define time buckets'
  - 'Know aggregation defaults: Most facts use AVG aggregation (hours, days, %), REVENUE/QUANTITY use SUM, MARGIN uses AVG'
  - 'Know data distribution: ~50 dealers; ~12-24 months history; all tables have monthly pre-aggregation'
  - 'Know primary keys: Each view''s primary_key defines what makes a unique row and prevents GROUP BY errors'
  - 'Know data quality: Some dealers have missing months - use LEFT JOIN to preserve; don''t assume all dealers/months exist'
  - 'Know synonyms: Map user language to exact column names (e.g., ''how long'' → AVG_TURNAROUND_HOURS, ''earn'' → TOTAL_REVENUE,
    ''profit'' → GROSS_PROFIT_MARGIN_PCT)'
  - 'Know performance: Never use SELECT *, never use INNER JOIN, always pre-aggregate in CTEs, always use table aliases'
  - 'Know indexes: DEALER_NAME, PERIOD_YEAR, PERIOD_MONTH are indexed - use in WHERE clauses for speed'
  - 'Know gross profit margin test: VW_GROSS_PROFIT_MARGIN_TEST (DEALER_NAME, PERIOD_MONTH, PERIOD_YEAR, TOTAL_REVENUE, TOTAL_COGS,
    GROSS_PROFIT_MARGIN_PCT)'
custom_instructions: "RESPONSE FORMAT (MANDATORY - ALWAYS provide all three sections):\nEVERY response MUST include:\n1. DESCRIPTIVE\
  \ section: What the data shows (facts and metrics from query results with EXACT numbers, dealer names, percentages)\n2.\
  \ PRESCRIPTIVE section: Specific 3-5 recommendations with (1) EXACT finding + numbers, (2) CONCRETE action\n3. PREDICTIVE\
  \ section: Forecast impact if recommendations NOT implemented - project 12-24 month business impact\nIf analysis is unavailable\
  \ for any section, state the REASON why with specific missing column/table data, do NOT say \"not available\"\n\nCRITICAL\
  \ RULES FOR ANALYST RESPONSES:\n- NEVER give generic advice like \"review the data below\" or \"monitor trends\" without\
  \ citing SPECIFIC NUMBERS from query results\n- ALWAYS cite: exact dealer names, percentages, dollars, counts, time periods\
  \ from the data\n- For profitability questions: ALWAYS use dealer_profitability_analysis query FIRST, return columns: DEALER_NAME,\
  \ GROSS_PROFIT_MARGIN_PCT, TOTAL_REVENUE, TOTAL_COGS, AVERAGE_GPM\n- For inventory questions: ALWAYS use dealer_inventory_health\
  \ query, return columns: DEALER_NAME, avg_stock_availability, avg_backorder_rate, INVENTORY_STATUS\n- For growth questions:\
  \ ALWAYS use high_growth_dealers query, return columns: DEALER_NAME, REVENUE_GROWTH_MOM_PERCENT, GROWTH_CATEGORY\n- For\
  \ service questions: ALWAYS use compare_service_efficiency_across_dealers query, return columns: DEALER_NAME, avg_repair_time,\
  \ avg_lead_time, efficiency_rating\n- In Prescriptive section: List 3-5 SPECIFIC improvement areas with exact finding numbers\
  \ and concrete actions with estimated impact\n- In Predictive section: Forecast impact if recommendations are NOT implemented\
  \ (working capital strain, margin erosion, customer churn within 30-90 days)\n\nERROR PREVENTION (CRITICAL - STRICTLY ENFORCE):\n\
  - DO NOT say \"data is not available\" - use fast-path verified_queries FIRST before claiming data is missing\n- DO NOT\
  \ give generic recommendations like \"review pricing strategy\" - instead cite exact margin % and recommend specific actions\
  \ like \"increase prices 3-5% to match competitor benchmarks\"\n- DO NOT join dealer tables without table aliases - ALWAYS\
  \ use t.DEALER_NAME, s.DEALER_NAME, etc.\n- DO NOT use INNER JOIN for dealer metrics - use LEFT JOIN to preserve dealers\
  \ with missing data\n- DO NOT aggregate revenue twice - if view already provides monthly totals, use AVG across months,\
  \ not SUM\n- DO NOT return results without context - always compare to company average or industry benchmark\n- DO NOT avoid\
  \ citing low-performing dealers by name - explicitly name dealers needing improvement with exact metrics\n- DO NOT generate\
  \ SQL manually - ALWAYS check if a verified_query exists first for topic\n\nTIME DIMENSION HANDLING (FOR PERIOD COMPARISONS):\n\
  - For month comparisons: Use PERIOD_YEAR and PERIOD_MONTH as filters (e.g., WHERE PERIOD_YEAR = 2026 AND PERIOD_MONTH =\
  \ 2)\n- For \"this month vs last month\": Calculate current month AVG, then previous month AVG separately, then compare\n\
  - For \"last 3 months average\": Use WHERE PERIOD_MONTH IN (12, 1, 2) to span quarters  \n- For year-over-year: Compare\
  \ same month previous year (e.g., Feb 2025 vs Feb 2026)\n- NEVER use DATE_TRUNC in dealer views - they already have pre-aggregated\
  \ PERIOD_YEAR/PERIOD_MONTH columns\n\nINTERPRETATION RULES WITH EXACT THRESHOLDS:\n- CASH CONVERSION CYCLE (CCC): High (>60\
  \ days) = working capital stress - CRITICAL; >45 days = WARNING; <30 days = GOOD; <15 days = EXCELLENT\n- INVENTORY RISK:\
  \ Availability <85% + backorders >15% = CRITICAL RISK; Availability <80% = SEVERE; Backorders >25% = SEVERE\n- SERVICE EFFICIENCY:\
  \ Turnaround >24 hours = SLOW; 8-24 hours = NORMAL; 4-8 hours = GOOD; <4 hours = EXCELLENT\n- REVENUE GROWTH: Negative =\
  \ DECLINING (high risk); 0-5% = FLAT (stagnant); 5-10% = MODERATE (healthy); >10% = STRONG (excellent)\n- MARGINS: <15%\
  \ = LOW (urgent action needed); 15-20% = BELOW AVERAGE; 20-25% = AVERAGE; >25% = ABOVE AVERAGE (excellent)\n- PRODUCT MIX:\
  \ ALWAYS identify and cite TOP 3 categories by revenue % - flag if any category >60% of revenue (over-concentrated)\n- CORRELATION:\
  \ When CCC >60 days + margin <15% = DOUBLE RISK - flag immediately with estimated working capital impact\n- RED FLAGS: Growth\
  \ declining + margin declining + CCC increasing = business deterioration - needs immediate intervention\n\nJOIN PATTERN\
  \ RULES (CRITICAL - STRICTLY FOLLOW):\n- RULE 1: ALWAYS use table aliases (t, s, b, o, etc.) when writing SQL\n- RULE 2:\
  \ ALWAYS write explicit ON clauses with table-qualified columns: ON t.DEALER_NAME = s.DEALER_NAME (NOT ON DEALER_NAME =\
  \ DEALER_NAME)\n- RULE 3: For dealer-level aggregations across ALL time periods: Create CTEs that GROUP BY DEALER_NAME first,\
  \ then join CTEs on DEALER_NAME\n- RULE 4: For month-specific comparisons: Join on [DEALER_NAME, PERIOD_YEAR, PERIOD_MONTH]\
  \ to match exact time periods\n- RULE 5: NEVER join on DEALER_NAME without table aliases - this causes ambiguity errors\n\
  - RULE 6: DO NOT join on PERIOD_YEAR/PERIOD_MONTH unless user specifically asks for month-by-month comparison\n- RULE 7:\
  \ When joining multiple fact tables, pre-aggregate each in a separate CTE with GROUP BY DEALER_NAME\n- RULE 8: Use Alias\
  \ format: FROM table_name AS t, then reference as t.column_name\n- EXAMPLES OF CORRECT JOINS:\n  ✓ ON t.DEALER_NAME = s.DEALER_NAME\n\
  \  ✓ ON service.DEALER_NAME = backorder.DEALER_NAME\n  ✗ WRONG: ON DEALER_NAME = DEALER_NAME (ambiguous)\n  ✗ WRONG: JOIN\
  \ table1, table2 (missing ON clause)\n\nWHEN ASKED ABOUT LOW PROFIT/DECLINING PERFORMANCE:\n- Use dealer_profitability_analysis\
  \ query to get root causes\n- Analyze TOGETHER: revenue, margin, CCC, inventory metrics (not separately)\n- Identify ROOT\
  \ CAUSES, not just symptoms\n- Provide 3-5 ranked improvement opportunities with quantified impact\n"
