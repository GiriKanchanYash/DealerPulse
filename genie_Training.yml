  - keyword: cost analysis
    query: dealer_costs
join_constraints:
  description: Strict rules that MUST be followed when joining dealer tables. These are parsed and enforced.
  mandatory_rules:
  - rule_id: ALWAYS_USE_TABLE_ALIASES
    severity: CRITICAL_ERROR
    rule: Every table in FROM/JOIN MUST have an explicit alias (AS t, AS s, AS b, etc.)
    pattern: FROM DEALER.INFORMATION_MART.VW_TABLE_NAME AS <alias>
    violation_pattern: FROM DEALER.INFORMATION_MART.VW_TABLE_NAME (missing alias)
    error_message: 'REJECTED: Table reference missing alias. Use: FROM table AS t'
    example_correct: FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN AS m
    example_wrong: FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN
  - rule_id: EXPLICIT_TABLE_QUALIFIED_JOINS
    severity: CRITICAL_ERROR
    rule: ON clauses MUST use table-qualified column names (alias.column_name)
    pattern: ON <alias1>.<column> = <alias2>.<column>
    violation_pattern: ON DEALER_NAME = DEALER_NAME
    error_message: 'REJECTED: Ambiguous join condition. Use: ON m.DEALER_NAME = g.DEALER_NAME'
    example_correct: ON margin.DEALER_NAME = growth.DEALER_NAME
    example_wrong: ON DEALER_NAME = DEALER_NAME
  - rule_id: JOIN_KEY_MAPPING
    severity: CRITICAL_ERROR
    rule: Each table has a PRIMARY join key - must be used in ON clauses
    joins:
    - tables:
      - VW_AVERAGE_REPAIR_TURNAROUND_TIME
      - VW_BACKORDER_INCIDENCE
      - VW_STOCK_AVAILABILITY_DEALER (non-PRODUCT_CATEGORY)
      - VW_CASH_CONVERSION_CYCLE
      - VW_DEALER_CONTRIBUTION_MARGIN
      - VW_DEALER_REVENUE_GROWTH
      - VW_GROSS_PROFIT_MARGIN
      - VW_ORDER_LEAD_TIME
      - VW_SALES_VOLUME
      join_key: DEALER_NAME
      note: These tables share DEALER_NAME as primary join key for dealer-level aggregations
    - tables:
      - VW_STOCK_AVAILABILITY_DEALER
      - VW_SALES_PER_PRODUCT_CATEGORY
      join_key: DEALER_NAME + PRODUCT_CATEGORY
      note: 'CRITICAL: When joining stock/sales by category, GROUP BY both dimensions first, then aggregate'
      correct_pattern: WITH stock_by_category AS (SELECT DEALER_NAME, PRODUCT_CATEGORY, AVG(...) FROM VW_STOCK_AVAILABILITY_DEALER
        GROUP BY DEALER_NAME, PRODUCT_CATEGORY)
  - rule_id: CTE_PREAGGREGATION_REQUIRED
    severity: HIGH_ERROR
    rule: When joining 3+ tables, ALWAYS pre-aggregate each in separate CTEs first
    when_required: Any query joining multiple fact tables (views ending in _VW)
    pattern: "WITH table1_agg AS (\n  SELECT DEALER_NAME, AGG_FUNC(metric) FROM table1 GROUP BY DEALER_NAME\n),\ntable2_agg\
      \ AS (\n  SELECT DEALER_NAME, AGG_FUNC(metric) FROM table2 GROUP BY DEALER_NAME\n)\nSELECT t1.DEALER_NAME, t1.metric,\
      \ t2.metric FROM table1_agg t1 LEFT JOIN table2_agg t2 ON t1.DEALER_NAME = t2.DEALER_NAME\n"
    why: Pre-aggregation prevents duplicate rows, GROUP BY errors, and ensures correct volume
    error_if_violated: Results will have duplicate rows, inflated metrics, or 'not in GROUP BY' errors
  - rule_id: NO_HARDCODED_JOINS_ON_DEALER_NAME
    severity: CRITICAL_ERROR
    rule: 'NEVER write: JOIN table ON DEALER_NAME = DEALER_NAME'
    trigger: Any join that doesn't qualify the column with table alias
    correction: 'Use explicit aliases: JOIN table AS t2 ON t1.DEALER_NAME = t2.DEALER_NAME'
    error_type: Ambiguous column reference - SQL engine cannot determine which table's DEALER_NAME
  - rule_id: USE_LEFT_JOIN_NOT_INNER
    severity: MEDIUM_ERROR
    rule: Use LEFT JOIN instead of INNER JOIN to preserve dealers with missing data
    reason: Not all dealers have data in all tables (missing months/categories). INNER JOIN removes dealers incorrectly
    example_correct: LEFT JOIN table2 ON t1.DEALER_NAME = t2.DEALER_NAME
    example_wrong: INNER JOIN table2 ON t1.DEALER_NAME = t2.DEALER_NAME
  - rule_id: SELECT_QUALIFIED_COLUMNS
    severity: HIGH_ERROR
    rule: All column references in SELECT clause MUST be qualified with table alias
    pattern: SELECT <alias>.<column>, <alias2>.<column>
    example_correct: SELECT m.DEALER_NAME, m.GROSS_PROFIT_MARGIN_PCT, t.AVG_TURNAROUND_HOURS
    example_wrong: SELECT DEALER_NAME, GROSS_PROFIT_MARGIN_PCT, AVG_TURNAROUND_HOURS
    error_type: Ambiguous column reference - violates SQL GROUP BY rules
  - rule_id: PRODUCT_CATEGORY_JOINS
    severity: CRITICAL_ERROR
    rule: VW_STOCK_AVAILABILITY_DEALER and VW_SALES_PER_PRODUCT_CATEGORY have PRODUCT_CATEGORY - must aggregate by category
      first
    correct_pattern: "WITH product_cat_agg AS (\n  SELECT DEALER_NAME, PRODUCT_CATEGORY, AVG(STOCK_AVAILABILITY_PCT) as avg_stock\
      \ FROM VW_STOCK_AVAILABILITY_DEALER\n  GROUP BY DEALER_NAME, PRODUCT_CATEGORY\n)\n"
    wrong_pattern: SELECT * FROM VW_STOCK_AVAILABILITY_DEALER JOIN other_table ON DEALER_NAME = DEALER_NAME (missing GROUP
      BY PRODUCT_CATEGORY)
    error_consequence: Will return multiple rows per dealer (one per category), causing join duplicates
