sql_generation_rules:
  description: Rules that MUST be enforced in all generated SQL queries
  generation_requirements:
  - requirement_id: ALIAS_EVERY_TABLE
    description: 'Assign unique 1-2 letter alias to each table: t, s, b, m, c, r, o, v, etc.'
    action_if_violated: REJECT generated query and ask user for feedback
    severity: CRITICAL
  - requirement_id: QUALIFY_ALL_COLUMNS
    description: Prefix every column reference with table alias (m.DEALER_NAME, not DEALER_NAME)
    action_if_violated: REJECT and regenerate
    severity: CRITICAL
  - requirement_id: EXPLICIT_ON_CLAUSE
    description: 'Every JOIN must have ON clause with both tables qualified: ON alias1.key = alias2.key'
    action_if_violated: REJECT and regenerate
    severity: CRITICAL
    example_correct: LEFT JOIN VW_BACKORDER_INCIDENCE AS b ON t.DEALER_NAME = b.DEALER_NAME
    example_wrong: LEFT JOIN VW_BACKORDER_INCIDENCE b ON DEALER_NAME = DEALER_NAME
  - requirement_id: PREAGGREGATE_FOR_MULTI_TABLE
    description: For queries joining 3+ tables, use CTEs to pre-aggregate each table separately first
    threshold: 3 or more tables
    action_if_violated: REJECT and regenerate with CTEs
    severity: HIGH
  - requirement_id: NO_SELECT_STAR
    description: Never use SELECT * - always explicitly list columns with table alias
    action_if_violated: REJECT and request explicit columns
    severity: MEDIUM
  - requirement_id: NO_IMPLICIT_JOINS
    description: 'Never use implicit joins with comma syntax: FROM t1, t2. Always use explicit JOIN keyword'
    action_if_violated: REJECT and regenerate
    severity: HIGH
  - requirement_id: GROUP_BY_CONSISTENCY
    description: All non-aggregated columns in SELECT must be in GROUP BY clause
    action_if_violated: REJECT and regenerate
    severity: CRITICAL
  - requirement_id: DEALER_NAME_JOIN_ONLY
    description: Default join key across dealer tables is DEALER_NAME. Do NOT join on PERIOD_YEAR/PERIOD_MONTH unless user
      specifically asks
    action_if_violated: 'Verify with user ask: ''Should I join by month-specific periods or by dealer across all months?'''
    severity: HIGH
  - requirement_id: PRODUCT_CATEGORY_AGGREGATE_FIRST
    description: Tables with PRODUCT_CATEGORY (VW_STOCK_AVAILABILITY_DEALER, VW_SALES_PER_PRODUCT_CATEGORY) must GROUP BY
      PRODUCT_CATEGORY before joining to other tables
    table_exception:
    - VW_STOCK_AVAILABILITY_DEALER
    - VW_SALES_PER_PRODUCT_CATEGORY
    correct_pattern: WITH table_agg AS (SELECT DEALER_NAME, SUM(...) FROM table GROUP BY DEALER_NAME)
    action_if_violated: REJECT - categorized data will create duplicate rows
    severity: CRITICAL
cortex_directives:
  description: Instructions telling Cortex Analyst how to use the semantic model constraints
  parser_instructions:
  - directive: READ_JOIN_CONSTRAINTS
    description: Before generating any SQL with JOINs, read the join_constraints section and apply ALL rules marked CRITICAL_ERROR
      or HIGH_ERROR
    priority: HIGHEST
  - directive: USE_TABLE_JOIN_MATRIX
    description: When joining tables, look up the exact join in table_join_matrix and use the exact alias, join_type, and
      on_clause provided
    priority: HIGHEST
  - directive: APPLY_SQL_GENERATION_RULES
    description: Every SQL query must satisfy ALL requirements in sql_generation_rules before returning to user
    priority: HIGHEST
  - directive: VALIDATE_ALIASES
    description: Check that every table has a DISTINCT alias. Never reuse the same alias for multiple tables
    priority: CRITICAL
  - directive: VALIDATE_JOIN_CONDITIONS
    description: 'Check every ON clause to ensure: (1) Both tables are qualified with their alias, (2) Column names match
      a valid join key, (3) No column is ambiguous'
    priority: CRITICAL
  - directive: PREAGGREGATE_FOR_COMPLEXITY
    description: If query involves 3+ tables, check sql_generation_rules.PREAGGREGATE_FOR_MULTI_TABLE and generate CTEs first
    priority: HIGH
  - directive: REJECT_AMBIGUOUS_JOINS
    description: If you detect 'ON DEALER_NAME = DEALER_NAME' or missing table aliases, IMMEDIATELY reject and regenerate
    priority: CRITICAL
  validation_checkpoints:
  - checkpoint: BEFORE_RETURNING_QUERY
    checks:
    - Does every table have an alias?
    - Is every column qualified with an alias?
    - Does every ON clause follow the table_join_matrix?
    - Are there ambiguous column references?
    - If 3+ tables, are there CTEs for pre-aggregation?
    - Is LEFT JOIN used (not INNER JOIN)?
    action_if_fails: REJECT query, explain which rule was violated, regenerate
cortex_error_prevention:
  description: Specific errors seen in generated queries - MUST be caught and REJECTED
  error_patterns:
  - error_id: ERROR_AMBIGUOUS_JOINS
    description: 'The exact error the user reported: ON DEALER_NAME = DEALER_NAME'
    user_query: SELECT DEALER_NAME, AVG_TURNAROUND_HOURS, BACKORDER_INCIDENCE_PCT, STOCK_AVAILABILITY_PCT FROM VW_AVERAGE_REPAIR_TURNAROUND_TIME
      JOIN VW_BACKORDER_INCIDENCE ON DEALER_NAME = DEALER_NAME JOIN VW_STOCK_AVAILABILITY_DEALER ON DEALER_NAME = DEALER_NAME
    root_cause: Missing table aliases and qualified column names
    error_type: SQL Syntax Error - Ambiguous column reference
    fix_template: "WITH turnaround AS (\n  SELECT DEALER_NAME, AVG(AVG_TURNAROUND_HOURS) as avg_tat FROM VW_AVERAGE_REPAIR_TURNAROUND_TIME\
      \ GROUP BY DEALER_NAME\n),\nbackorder AS (\n  SELECT DEALER_NAME, AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder FROM\
      \ VW_BACKORDER_INCIDENCE GROUP BY DEALER_NAME\n),\nstock AS (\n  SELECT DEALER_NAME, AVG(STOCK_AVAILABILITY_PCT) as\
      \ avg_stock FROM VW_STOCK_AVAILABILITY_DEALER GROUP BY DEALER_NAME\n)\nSELECT t.DEALER_NAME, t.avg_tat, b.avg_backorder,\
      \ s.avg_stock\nFROM turnaround t\nLEFT JOIN backorder b ON t.DEALER_NAME = b.DEALER_NAME\nLEFT JOIN stock s ON t.DEALER_NAME\
      \ = s.DEALER_NAME\n"
    key_fixes:
    - '1. Added table aliases: t, b, s for each CTE'
    - '2. Used explicit ON clauses: t.DEALER_NAME = b.DEALER_NAME (not ambiguous)'
    - 3. Pre-aggregated each table in CTEs to DEALER_NAME level
    - 4. Used LEFT JOIN to preserve dealers with missing data
    detection_trigger: Any query containing 'ON DEALER_NAME = DEALER_NAME'
    cortex_action: REJECT immediately, explain the ambiguous join, then regenerate with CTEs and table aliases
  - error_id: ERROR_MISSING_PREAGGREGATE
    description: GROUP BY DEALER_NAME fails when joining tables with PRODUCT_CATEGORY
    example_wrong: SELECT * FROM VW_STOCK_AVAILABILITY_DEALER JOIN VW_BACKORDER_INCIDENCE ON DEALER_NAME = DEALER_NAME GROUP
      BY DEALER_NAME
    reason: VW_STOCK_AVAILABILITY_DEALER has multiple rows per dealer (one per PRODUCT_CATEGORY). Joining without pre-aggregation
      creates duplicate rows
    fix_template: "WITH stock_agg AS (\n  SELECT DEALER_NAME, AVG(STOCK_AVAILABILITY_PCT) as avg_stock FROM VW_STOCK_AVAILABILITY_DEALER\n\
      \  GROUP BY DEALER_NAME  -- Aggregate away the PRODUCT_CATEGORY dimension\n),\nbackorder_agg AS (\n  SELECT DEALER_NAME,\
      \ AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder FROM VW_BACKORDER_INCIDENCE\n  GROUP BY DEALER_NAME\n)\nSELECT s.DEALER_NAME,\
      \ s.avg_stock, b.avg_backorder\nFROM stock_agg s\nLEFT JOIN backorder_agg b ON s.DEALER_NAME = b.DEALER_NAME\n"
    key_fixes:
    - 1. Group by DEALER_NAME only (not PRODUCT_CATEGORY)
    - 2. This collapses all product categories into one stock availability value per dealer
    - 3. Now the join won't create duplicate rows
    detection_trigger: Any table with PRODUCT_CATEGORY being joined without GROUP BY DEALER_NAME (non-category) pre-aggregation
    cortex_action: REJECT and regenerate with CTEs that aggregate out the PRODUCT_CATEGORY dimension
  - error_id: ERROR_NO_GROUP_BY
    description: GROUP BY missing when using AVG() or SUM() aggregates
    example_wrong: SELECT DEALER_NAME, AVG(AVG_TURNAROUND_HOURS) FROM VW_AVERAGE_REPAIR_TURNAROUND_TIME
    error_message: 'SQL Error: aggregate function not in GROUP BY clause'
    fix: 'Add GROUP BY clause: GROUP BY DEALER_NAME'
    cortex_action: REJECT and regenerate with GROUP BY clause
  - error_id: ERROR_HARDCODED_YEAR
    description: User query had WHERE PERIOD_YEAR = 2022 but current data is 2026
    example_wrong: WHERE PERIOD_YEAR = 2022
    issue: Query returns no results or historical data instead of current
    fix_options:
    - 'Option A: WHERE PERIOD_YEAR = 2026 (current year)'
    - 'Option B: WHERE PERIOD_YEAR = (SELECT MAX(PERIOD_YEAR) FROM table) (auto-latest)'
    - 'Option C: Ask user: ''Do you want current data (2026) or historical (2022)?'''
    cortex_action: Generate query with MAX(PERIOD_YEAR) by default, but ask user to confirm time period
