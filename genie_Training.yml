relationships:
- description: Service metrics by dealer - aggregate across all periods, join on DEALER_NAME only with explicit table aliases
  join_key:
  - DEALER_NAME
  join_pattern: "WITH service_agg AS (\n  SELECT DEALER_NAME, AVG(AVG_TURNAROUND_HOURS) as avg_tat FROM VW_AVERAGE_REPAIR_TURNAROUND_TIME\
    \ GROUP BY DEALER_NAME\n),\nlead_agg AS (\n  SELECT DEALER_NAME, AVG(AVG_ORDER_LEAD_TIME_DAYS) as avg_lead FROM VW_ORDER_LEAD_TIME\
    \ GROUP BY DEALER_NAME\n)\nSELECT s.DEALER_NAME, s.avg_tat, l.avg_lead FROM service_agg s LEFT JOIN lead_agg l ON s.DEALER_NAME\
    \ = l.DEALER_NAME\n"
  primary_table: VW_AVERAGE_REPAIR_TURNAROUND_TIME
  joinable_tables:
  - VW_ORDER_LEAD_TIME
  - VW_STOCK_AVAILABILITY_DEALER
  - VW_BACKORDER_INCIDENCE
  critical_note: Use explicit table aliases (s.DEALER_NAME, l.DEALER_NAME) in ON clause. NEVER use ON DEALER_NAME = DEALER_NAME
- description: Inventory metrics join for stock and backorder analysis - MUST use table aliases and aggregate first
  join_key:
  - DEALER_NAME
  join_pattern: "WITH stock_agg AS (\n  SELECT DEALER_NAME, AVG(STOCK_AVAILABILITY_PCT) as avg_stock FROM VW_STOCK_AVAILABILITY_DEALER\
    \ GROUP BY DEALER_NAME\n),\nbackorder_agg AS (\n  SELECT DEALER_NAME, AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder FROM\
    \ VW_BACKORDER_INCIDENCE GROUP BY DEALER_NAME\n)\nSELECT st.DEALER_NAME, st.avg_stock, b.avg_backorder FROM stock_agg\
    \ st LEFT JOIN backorder_agg b ON st.DEALER_NAME = b.DEALER_NAME\n"
  primary_table: VW_STOCK_AVAILABILITY_DEALER
  joinable_tables:
  - VW_BACKORDER_INCIDENCE
  critical_note: 'ALWAYS qualify joins: ON st.DEALER_NAME = b.DEALER_NAME (not ON DEALER_NAME = DEALER_NAME)'
- description: Sales and operational metrics join on DEALER_NAME with aggregation across all periods - use explicit table
    aliases
  join_key:
  - DEALER_NAME
  join_pattern: "WITH sales_agg AS (\n  SELECT DEALER_NAME, SUM(TOTAL_QUANTITY) as total_units FROM VW_SALES_PER_PRODUCT_CATEGORY\
    \ GROUP BY DEALER_NAME\n),\nmargin_agg AS (\n  SELECT DEALER_NAME, AVG(GROSS_PROFIT_MARGIN_PCT) as avg_margin FROM VW_GROSS_PROFIT_MARGIN\
    \ GROUP BY DEALER_NAME\n)\nSELECT sa.DEALER_NAME, sa.total_units, m.avg_margin FROM sales_agg sa LEFT JOIN margin_agg\
    \ m ON sa.DEALER_NAME = m.DEALER_NAME\n"
  primary_table: VW_SALES_PER_PRODUCT_CATEGORY
  joinable_tables:
  - VW_GROSS_PROFIT_MARGIN
  - VW_DEALER_CONTRIBUTION_MARGIN
  - VW_AVERAGE_REPAIR_TURNAROUND_TIME
  - VW_ORDER_LEAD_TIME
  critical_note: Each table alias must be different (sa, m, t, etc). NEVER reuse the same alias for multiple tables
- description: Revenue growth analysis - aggregate by DEALER_NAME using CTEs, then join on DEALER_NAME with explicit aliases
  join_key:
  - DEALER_NAME
  join_pattern: "WITH revenue_agg AS (\n  SELECT DEALER_NAME, AVG(REVENUE_GROWTH_MOM_PERCENT) as avg_growth FROM VW_DEALER_REVENUE_GROWTH\
    \ GROUP BY DEALER_NAME\n),\nvolume_agg AS (\n  SELECT DEALER_NAME, SUM(UNITS_SOLD) as total_volume FROM VW_SALES_VOLUME\
    \ GROUP BY DEALER_NAME\n)\nSELECT r.DEALER_NAME, r.avg_growth, v.total_volume FROM revenue_agg r LEFT JOIN volume_agg\
    \ v ON r.DEALER_NAME = v.DEALER_NAME\n"
  primary_table: VW_DEALER_REVENUE_GROWTH
  joinable_tables:
  - VW_SALES_VOLUME
  critical_note: Use LEFT JOIN (not INNER JOIN) to preserve dealers with partial data
- description: Financial efficiency metrics - aggregate first in CTEs, then join on DEALER_NAME only using explicit aliases
  join_key:
  - DEALER_NAME
  join_pattern: "WITH cash_agg AS (\n  SELECT DEALER_NAME, AVG(CCC) as avg_ccc FROM VW_CASH_CONVERSION_CYCLE GROUP BY DEALER_NAME\n\
    ),\nprofit_agg AS (\n  SELECT DEALER_NAME, AVG(GROSS_PROFIT_MARGIN_PCT) as avg_gpm FROM VW_GROSS_PROFIT_MARGIN GROUP BY\
    \ DEALER_NAME\n)\nSELECT c.DEALER_NAME, c.avg_ccc, p.avg_gpm FROM cash_agg c LEFT JOIN profit_agg p ON c.DEALER_NAME =\
    \ p.DEALER_NAME\n"
  primary_table: VW_CASH_CONVERSION_CYCLE
  joinable_tables:
  - VW_GROSS_PROFIT_MARGIN
  - VW_DEALER_CONTRIBUTION_MARGIN
  critical_note: 'CRITICAL: Always use ''c.DEALER_NAME = p.DEALER_NAME'' format, NEVER ''ON DEALER_NAME = DEALER_NAME'''
- description: Month-specific analysis - join on [DEALER_NAME, PERIOD_YEAR, PERIOD_MONTH] for exact time period matching
  join_key:
  - DEALER_NAME
  - PERIOD_YEAR
  - PERIOD_MONTH
  join_pattern: Use ONLY when user asks for month-by-month or period-specific comparisons. Still use explicit table aliases
    (t.DEALER_NAME = s.DEALER_NAME AND t.PERIOD_YEAR = s.PERIOD_YEAR AND t.PERIOD_MONTH = s.PERIOD_MONTH)
  use_case: Time-series analysis requiring exact period alignment
  critical_note: DO NOT use month-level joins for general dealer comparisons. Use DEALER_NAME only joins instead
query_patterns:
- pattern_name: Dealer Profitability Analysis
  description: Combine financial metrics for complete profitability view
  template: "SELECT \n  m.DEALER_NAME,\n  m.GROSS_PROFIT_MARGIN_PCT,\n  c.CCC,\n  cm.CONTRIBUTION_MARGIN_PCT\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\
    \ m\nLEFT JOIN DEALER.INFORMATION_MART.VW_CASH_CONVERSION_CYCLE c\n  ON m.DEALER_NAME = c.DEALER_NAME\nLEFT JOIN DEALER.INFORMATION_MART.VW_DEALER_CONTRIBUTION_MARGIN\
    \ cm\n  ON m.DEALER_NAME = cm.DEALER_NAME\nORDER BY m.GROSS_PROFIT_MARGIN_PCT DESC"
- pattern_name: Dealer Revenue Growth Analysis
  description: Analyze revenue growth trends with profitability
  template: "SELECT \n  r.DEALER_NAME,\n  r.PERIOD_YEAR,\n  r.REVENUE,\n  r.REVENUE_GROWTH_MOM_PERCENT,\n  v.UNITS_SOLD,\n\
    \  m.GROSS_PROFIT_MARGIN_PCT\nFROM DEALER.INFORMATION_MART.VW_DEALER_REVENUE_GROWTH r\nLEFT JOIN DEALER.INFORMATION_MART.VW_SALES_VOLUME\
    \ v\n  ON r.DEALER_NAME = v.DEALER_NAME AND r.PERIOD_YEAR = v.PERIOD_YEAR\nLEFT JOIN DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\
    \ m\n  ON r.DEALER_NAME = m.DEALER_NAME\nORDER BY r.REVENUE_GROWTH_MOM_PERCENT DESC"
- pattern_name: Dealer Service & Sales Performance
  description: Combine service efficiency with sales volume - aggregate first, then join on DEALER_NAME
  template: "WITH service_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(AVG_TURNAROUND_HOURS) as avg_repair_hours\n  FROM\
    \ DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\n  GROUP BY DEALER_NAME\n),\nlead_agg AS (\n  SELECT \n  \
    \  DEALER_NAME,\n    AVG(AVG_ORDER_LEAD_TIME_DAYS) as avg_lead_time\n  FROM DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\n\
    \  GROUP BY DEALER_NAME\n),\nrevenue_agg AS (\n  SELECT \n    DEALER_NAME,\n    SUM(TOTAL_REVENUE) as total_revenue\n\
    \  FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n)\nSELECT \n  t.DEALER_NAME,\n  t.avg_repair_hours,\n\
    \  l.avg_lead_time,\n  r.total_revenue as sales_revenue\nFROM service_agg t\nLEFT JOIN lead_agg l ON t.DEALER_NAME = l.DEALER_NAME\n\
    LEFT JOIN revenue_agg r ON t.DEALER_NAME = r.DEALER_NAME\nORDER BY t.avg_repair_hours ASC"
- pattern_name: Service Efficiency Comparison Across Dealers
  description: Compare service efficiency metrics across dealers - aggregate first, then join on DEALER_NAME only
  template: "WITH service_metrics AS (\n  SELECT \n    t.DEALER_NAME,\n    AVG(t.AVG_TURNAROUND_HOURS) as avg_repair_time,\n\
    \    AVG(s.STOCK_AVAILABILITY_PCT) as avg_stock_availability,\n    AVG(b.BACKORDER_INCIDENCE_PCT) as avg_backorder_rate,\n\
    \    AVG(o.AVG_ORDER_LEAD_TIME_DAYS) as avg_lead_time\n  FROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\
    \ t\n  LEFT JOIN DEALER.INFORMATION_MART.VW_STOCK_AVAILABILITY_DEALER s \n    ON t.DEALER_NAME = s.DEALER_NAME\n  LEFT\
    \ JOIN DEALER.INFORMATION_MART.VW_BACKORDER_INCIDENCE b \n    ON t.DEALER_NAME = b.DEALER_NAME\n  LEFT JOIN DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\
    \ o \n    ON t.DEALER_NAME = o.DEALER_NAME\n  GROUP BY t.DEALER_NAME\n)\nSELECT *,\n  (CASE \n    WHEN avg_repair_time\
    \ <= (SELECT AVG(avg_repair_time) FROM service_metrics) \n    AND avg_stock_availability >= (SELECT AVG(avg_stock_availability)\
    \ FROM service_metrics)\n    AND avg_backorder_rate <= (SELECT AVG(avg_backorder_rate) FROM service_metrics)\n    THEN\
    \ 'High Efficiency'\n    ELSE 'Needs Improvement'\n  END) as efficiency_rating\nFROM service_metrics\nORDER BY avg_repair_time\
    \ ASC"
- pattern_name: Dealer Inventory Health
  description: Analyze stock availability and backorder issues - aggregate first, then join on DEALER_NAME
  template: "WITH stock_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(STOCK_AVAILABILITY_PCT) as avg_stock_availability,\n\
    \    PRODUCT_CATEGORY\n  FROM DEALER.INFORMATION_MART.VW_STOCK_AVAILABILITY_DEALER\n  GROUP BY DEALER_NAME, PRODUCT_CATEGORY\n\
    ),\nbackorder_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder_rate\n  FROM DEALER.INFORMATION_MART.VW_BACKORDER_INCIDENCE\n\
    \  GROUP BY DEALER_NAME\n)\nSELECT \n  s.DEALER_NAME,\n  s.PRODUCT_CATEGORY,\n  s.avg_stock_availability as STOCK_AVAILABILITY_PCT,\n\
    \  b.avg_backorder_rate as BACKORDER_INCIDENCE_PCT\nFROM stock_agg s\nLEFT JOIN backorder_agg b\n  ON s.DEALER_NAME =\
    \ b.DEALER_NAME\nORDER BY s.avg_stock_availability ASC"
- pattern_name: Product Category Sales Mix
  description: Analyze sales distribution across product categories
  template: "SELECT \n  DEALER_NAME,\n  PRODUCT_CATEGORY,\n  TOTAL_REVENUE,\n  TOTAL_QUANTITY,\n  ROUND(100.0 * TOTAL_REVENUE\
    \ / SUM(TOTAL_REVENUE) OVER (PARTITION BY DEALER_NAME), 2) as revenue_share_pct\nFROM DEALER.INFORMATION_MART.VW_SALES_PER_PRODUCT_CATEGORY\n\
    ORDER BY DEALER_NAME, TOTAL_REVENUE DESC"
verified_queries:
- name: dealer_profitability_analysis
  question: Which dealers have low profits? What are the root causes?
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'GROSS_PROFIT_MARGIN_PCT: Current margin as percentage (0-100)'
  - 'TOTAL_REVENUE: Total revenue in dollars'
  - 'TOTAL_COGS: Cost of goods sold'
  - 'AVERAGE_GPM: Company-wide average margin %'
  expected_row_count: All dealers below company average
  sort_order: By GROSS_PROFIT_MARGIN_PCT ascending (worst first)
  visual_recommendation: Horizontal bar with avg reference line, red if <15%, yellow if 15-20%, green if >20%
  sql: "WITH gpm AS (\n  SELECT DEALER_NAME, GROSS_PROFIT_MARGIN_PCT, TOTAL_REVENUE, TOTAL_COGS,\n        AVG(GROSS_PROFIT_MARGIN_PCT)\
    \ OVER() AS avg_gpm\n  FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n)\nSELECT\n  DEALER_NAME,\n  GROSS_PROFIT_MARGIN_PCT,\n\
    \  TOTAL_REVENUE,\n  TOTAL_COGS,\n  ROUND(avg_gpm, 2) AS AVERAGE_GPM\nFROM gpm\nWHERE GROSS_PROFIT_MARGIN_PCT < avg_gpm\n\
    ORDER BY GROSS_PROFIT_MARGIN_PCT ASC"
- name: check_dealer_ccc
  question: What is the Cash Conversion Cycle for dealers? Who has the worst cash cycle?
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'CCC: Cash Conversion Cycle in days'
  - 'DSO: Days Sales Outstanding'
  - 'DIO: Days Inventory Outstanding'
  - 'DPO: Days Payable Outstanding'
  - 'CASH_HEALTH: Status (CRITICAL/WARNING/GOOD/NORMAL)'
  expected_row_count: All dealers
  sort_order: By CCC descending (worst cash cycle first)
  visual_recommendation: Horizontal bar chart, red if >60 days (CRITICAL), yellow if 45-60 (WARNING), green if <30 (GOOD)
  prescriptive_guidance: Flag CCC >60 as CRITICAL working capital issue requiring immediate action
  sql: "SELECT \n  DEALER_NAME,\n  CCC,\n  DSO,\n  DIO,\n  DPO,\n  CASE \n    WHEN CCC > 60 THEN 'CRITICAL - High working\
    \ capital stress'\n    WHEN CCC > 45 THEN 'WARNING - Above-average cycle time'\n    WHEN CCC < 30 THEN 'GOOD - Efficient\
    \ cash management'\n    ELSE 'NORMAL'\n  END AS CASH_HEALTH\nFROM DEALER.INFORMATION_MART.VW_CASH_CONVERSION_CYCLE\nORDER\
    \ BY CCC DESC"
- name: dealer_gross_margin
  question: Show the gross profit margin for all dealers. Who has the lowest margins?
  use_as_onboarding_question: true
  sql: "SELECT \n  DEALER_NAME,\n  TOTAL_REVENUE,\n  TOTAL_COGS,\n  GROSS_PROFIT_MARGIN_PCT,\n  ROUND(100.0 * GROSS_PROFIT_MARGIN_PCT\
    \ / AVG(GROSS_PROFIT_MARGIN_PCT) OVER (), 1) AS PCT_VS_AVG\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\nORDER\
    \ BY GROSS_PROFIT_MARGIN_PCT ASC"
- name: high_growth_dealers
  question: Which dealers had strong revenue growth? Show growth trends.
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'PERIOD_YEAR: Fiscal year'
  - 'REVENUE: Current period revenue in dollars'
  - 'PREV_MONTH_REVENUE: Previous period revenue'
  - 'REVENUE_GROWTH_MOM_PERCENT: Growth rate as percentage (-100 to +500)'
  - 'GROWTH_CATEGORY: STRONG/MODERATE/FLAT/DECLINING'
  expected_row_count: All dealers with growth data
  sort_order: By REVENUE_GROWTH_MOM_PERCENT descending (highest growth first)
  visual_recommendation: Line chart showing growth trends over time; or scatter plot X=revenue, Y=growth%, colored by category
  prescriptive_guidance: Cite exact growth %; flag >10% growth dealers (maintain strategy), <0% declining dealers (investigate
    market/competitive issues)
  sql: "SELECT\n  DEALER_NAME,\n  PERIOD_YEAR,\n  REVENUE,\n  PREV_MONTH_REVENUE,\n  REVENUE_GROWTH_MOM_PERCENT,\n  CASE \n\
    \    WHEN REVENUE_GROWTH_MOM_PERCENT > 15 THEN 'STRONG'\n    WHEN REVENUE_GROWTH_MOM_PERCENT > 5 THEN 'MODERATE'\n   \
    \ WHEN REVENUE_GROWTH_MOM_PERCENT < 0 THEN 'DECLINING'\n    ELSE 'FLAT'\n  END AS GROWTH_CATEGORY\nFROM DEALER.INFORMATION_MART.VW_DEALER_REVENUE_GROWTH\n\
    ORDER BY REVENUE_GROWTH_MOM_PERCENT DESC"
- name: dealer_inventory_health
  question: Show stock availability and backorder rates by dealer. Which dealers have inventory issues?
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'avg_stock_availability: Stock availability percentage (0-100)'
  - 'backorder_incidence: Backorder rate percentage (0-100)'
  - 'INVENTORY_STATUS: Status (CRITICAL/WARNING/HEALTHY)'
  expected_row_count: All dealers
  sort_order: By avg_stock_availability ascending (worst availability first)
  visual_recommendation: 'Bubble chart: X=stock availability, Y=backorder rate, colored red if CRITICAL, yellow if WARNING,
    green if HEALTHY'
  prescriptive_guidance: CRITICAL if availability <85% AND backorders >15% - needs immediate supplier/forecasting action
  sql: "WITH stock_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(STOCK_AVAILABILITY_PCT) as avg_stock_availability\n  FROM\
    \ DEALER.INFORMATION_MART.VW_STOCK_AVAILABILITY_DEALER\n  GROUP BY DEALER_NAME\n),\nbackorder_agg AS (\n  SELECT \n  \
    \  DEALER_NAME,\n    AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder_rate\n  FROM DEALER.INFORMATION_MART.VW_BACKORDER_INCIDENCE\n\
    \  GROUP BY DEALER_NAME\n)\nSELECT \n  s.DEALER_NAME,\n  ROUND(s.avg_stock_availability, 1) as avg_stock_availability,\n\
    \  COALESCE(b.avg_backorder_rate, 0) as backorder_incidence,\n  CASE\n    WHEN s.avg_stock_availability < 85 AND COALESCE(b.avg_backorder_rate,\
    \ 0) > 15 \n      THEN 'CRITICAL - Both low availability and high backorders'\n    WHEN s.avg_stock_availability < 85\
    \ \n      THEN 'WARNING - Low stock availability'\n    WHEN COALESCE(b.avg_backorder_rate, 0) > 15 \n      THEN 'WARNING\
    \ - High backorder rate'\n    ELSE 'HEALTHY'\n  END AS INVENTORY_STATUS\nFROM stock_agg s\nLEFT JOIN backorder_agg b\n\
    \  ON s.DEALER_NAME = b.DEALER_NAME\nORDER BY s.avg_stock_availability ASC"
- name: dealer_service_efficiency
  question: Show service efficiency by repair turnaround time. Which dealers are slowest?
  sql: "SELECT\n  DEALER_NAME,\n  COUNT(*) as months_with_data,\n  ROUND(AVG(AVG_TURNAROUND_HOURS), 1) AS avg_turnaround_hours,\n\
    \  MIN(AVG_TURNAROUND_HOURS) AS min_hours,\n  MAX(AVG_TURNAROUND_HOURS) AS max_hours,\n  CASE \n    WHEN AVG(AVG_TURNAROUND_HOURS)\
    \ < 4 THEN 'EXCELLENT'\n    WHEN AVG(AVG_TURNAROUND_HOURS) < 8 THEN 'GOOD'\n    WHEN AVG(AVG_TURNAROUND_HOURS) < 24 THEN\
    \ 'FAIR'\n    ELSE 'SLOW'\n  END AS EFFICIENCY_RATING\nFROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\n\
    GROUP BY DEALER_NAME\nORDER BY avg_turnaround_hours DESC;"
- name: compare_service_efficiency_across_dealers
  question: Compare service efficiency across dealers. Show repair time, stock availability, backorder rate, and lead time.
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'avg_repair_time: Average turnaround hours (lower is better)'
  - 'avg_stock_availability: Stock availability % (higher is better)'
  - 'avg_backorder_rate: Backorder rate % (lower is better)'
  - 'avg_lead_time: Order lead time in days (lower is better)'
  - 'efficiency_rating: High Efficiency or Needs Improvement'
  expected_row_count: All dealers
  sort_order: By avg_repair_time ascending (fastest service first)
  visual_recommendation: Radar chart or scorecard showing 5 metrics per dealer with color-coding
  prescriptive_guidance: Compare each dealer to company averages; highlight dealers below average on critical metrics; suggest
    targeted improvements
  sql: "WITH service_metrics AS (\n  SELECT \n    t.DEALER_NAME,\n    AVG(t.AVG_TURNAROUND_HOURS) as avg_repair_time,\n  \
    \  AVG(s.STOCK_AVAILABILITY_PCT) as avg_stock_availability,\n    AVG(b.BACKORDER_INCIDENCE_PCT) as avg_backorder_rate,\n\
    \    AVG(o.AVG_ORDER_LEAD_TIME_DAYS) as avg_lead_time\n  FROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\
    \ t\n  LEFT JOIN DEALER.INFORMATION_MART.VW_STOCK_AVAILABILITY_DEALER s \n    ON t.DEALER_NAME = s.DEALER_NAME\n  LEFT\
    \ JOIN DEALER.INFORMATION_MART.VW_BACKORDER_INCIDENCE b \n    ON t.DEALER_NAME = b.DEALER_NAME\n  LEFT JOIN DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\
    \ o \n    ON t.DEALER_NAME = o.DEALER_NAME\n  GROUP BY t.DEALER_NAME\n)\nSELECT *,\n  (CASE \n    WHEN avg_repair_time\
    \ <= (SELECT AVG(avg_repair_time) FROM service_metrics) \n    AND avg_stock_availability >= (SELECT AVG(avg_stock_availability)\
    \ FROM service_metrics)\n    AND avg_backorder_rate <= (SELECT AVG(avg_backorder_rate) FROM service_metrics)\n    THEN\
    \ 'High Efficiency'\n    ELSE 'Needs Improvement'\n  END) as efficiency_rating\nFROM service_metrics\nORDER BY avg_repair_time\
    \ ASC;"
- name: dealer_operational_metrics
  question: 'Compare dealer operational performance: lead time, service efficiency, and sales.'
  sql: "WITH service_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(AVG_TURNAROUND_HOURS) as avg_repair_hours\n  FROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\n\
    \  GROUP BY DEALER_NAME\n),\nlead_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(AVG_ORDER_LEAD_TIME_DAYS) as avg_lead_time_days\n\
    \  FROM DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\n  GROUP BY DEALER_NAME\n),\nrevenue_agg AS (\n  SELECT \n    DEALER_NAME,\n\
    \    SUM(TOTAL_REVENUE) as total_revenue\n  FROM DEALER.INFORMATION_MART.VW_SALES_PER_PRODUCT_CATEGORY\n  GROUP BY DEALER_NAME\n\
    ),\nmargin_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) as avg_gross_profit_margin_pct\n  FROM\
    \ DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n)\nSELECT\n  t.DEALER_NAME,\n  ROUND(t.avg_repair_hours,\
    \ 1) as avg_repair_hours,\n  ROUND(l.avg_lead_time_days, 1) as avg_lead_time_days,\n  r.total_revenue,\n  ROUND(m.avg_gross_profit_margin_pct,\
    \ 2) as GROSS_PROFIT_MARGIN_PCT\nFROM service_agg t\nLEFT JOIN lead_agg l ON t.DEALER_NAME = l.DEALER_NAME\nLEFT JOIN\
    \ revenue_agg r ON t.DEALER_NAME = r.DEALER_NAME\nLEFT JOIN margin_agg m ON t.DEALER_NAME = m.DEALER_NAME\nORDER BY t.avg_repair_hours\
    \ ASC;"
- name: dealer_sales_by_category
  question: Show sales by product category. What is the revenue mix for each dealer?
  sql: "SELECT\n  DEALER_NAME,\n  PRODUCT_CATEGORY,\n  TOTAL_REVENUE,\n  TOTAL_QUANTITY,\n  ROUND(100.0 * TOTAL_REVENUE /\
    \ SUM(TOTAL_REVENUE) OVER (PARTITION BY DEALER_NAME), 1) as revenue_share_pct\nFROM DEALER.INFORMATION_MART.VW_SALES_PER_PRODUCT_CATEGORY\n\
    ORDER BY DEALER_NAME, TOTAL_REVENUE DESC"
- name: declining_product_categories
  question: Which categories show declining sales? Which product categories are declining? What categories need corrective
    action? Show declining categories.
  use_as_onboarding_question: false
  expected_columns:
  - 'PRODUCT_CATEGORY: Product category name'
  - 'TOTAL_REVENUE: Total category revenue'
  - 'TOTAL_QUANTITY: Total units sold in category'
  - 'avg_monthly_revenue: Average monthly revenue for category'
  - 'revenue_trend: Trend indicator (DECLINING_CRITICAL/DECLINING/FLAT/GROWING)'
  - 'category_share_pct: Percentage of total company revenue'
  expected_row_count: Categories with declining or flat sales
  sort_order: By TOTAL_REVENUE descending within each trend
  visual_recommendation: Highlight DECLINING_CRITICAL in red, DECLINING in orange, FLAT in yellow; sort by TOTAL_REVENUE to
    show impact
  prescriptive_guidance: 'DECLINING_CRITICAL categories losing >20% revenue need immediate action: pricing review, promotional
    strategy, or discontinuation analysis. Show exact revenue loss and affected dealers.'
  sql: "WITH category_metrics AS (\n  SELECT \n    PRODUCT_CATEGORY,\n    SUM(COALESCE(TOTAL_REVENUE, 0)) AS total_revenue,\n\
    \    SUM(COALESCE(TOTAL_QUANTITY, 0)) AS total_quantity,\n    COUNT(DISTINCT DEALER_NAME) AS num_dealers,\n    COUNT(*)\
    \ AS sample_count,\n    CASE \n      WHEN COUNT(*) > 0 THEN ROUND(SUM(COALESCE(TOTAL_REVENUE, 0))::FLOAT / COUNT(*), 2)\n\
    \      ELSE 0\n    END AS avg_monthly_revenue\n  FROM DEALER.INFORMATION_MART.VW_SALES_PER_PRODUCT_CATEGORY\n  WHERE PRODUCT_CATEGORY\
    \ IS NOT NULL AND TOTAL_REVENUE IS NOT NULL\n  GROUP BY PRODUCT_CATEGORY\n),\ncategory_stats AS (\n  SELECT \n    *,\n\
    \    AVG(total_revenue) OVER () AS company_avg_category_revenue\n  FROM category_metrics\n)\nSELECT \n  PRODUCT_CATEGORY,\n\
    \  total_revenue,\n  total_quantity,\n  num_dealers,\n  ROUND(avg_monthly_revenue, 2) AS avg_monthly_revenue,\n  ROUND(100.0\
    \ * total_revenue / SUM(total_revenue) OVER (), 2) AS category_share_pct,\n  CASE \n    WHEN total_revenue < company_avg_category_revenue\
    \ * 0.8 AND sample_count > 3 THEN 'DECLINING_CRITICAL'\n    WHEN total_revenue < company_avg_category_revenue * 0.95 AND\
    \ sample_count > 2 THEN 'DECLINING'\n    WHEN total_revenue BETWEEN company_avg_category_revenue * 0.95 AND company_avg_category_revenue\
    \ * 1.05 THEN 'FLAT'\n    ELSE 'GROWING'\n  END AS revenue_trend,\n  CASE \n    WHEN total_revenue < company_avg_category_revenue\
    \ * 0.8 THEN 'URGENT - Review pricing, promotion, or discontinue'\n    WHEN total_revenue < company_avg_category_revenue\
    \ * 0.95 THEN 'ACTION NEEDED - Develop recovery plan'\n    WHEN total_revenue BETWEEN company_avg_category_revenue * 0.95\
    \ AND company_avg_category_revenue * 1.05 THEN 'MONITOR - Track for trends'\n    ELSE 'MAINTAIN - Strong performance'\n\
    \  END AS corrective_action\nFROM category_stats\nWHERE total_revenue < company_avg_category_revenue * 1.05\nORDER BY\
    \ total_revenue DESC;"
- name: dealer_sales_volume_trend
  question: What are the sales volume trends by dealer year-over-year?
  sql: "SELECT\n  DEALER_NAME,\n  PERIOD_YEAR,\n  UNITS_SOLD,\n  LAG(UNITS_SOLD) OVER (PARTITION BY DEALER_NAME ORDER BY PERIOD_YEAR)\
    \ as prev_year_units,\n  ROUND(UNITS_SOLD - LAG(UNITS_SOLD) OVER (PARTITION BY DEALER_NAME ORDER BY PERIOD_YEAR), 0) as\
    \ yoy_change\nFROM DEALER.INFORMATION_MART.VW_SALES_VOLUME\nORDER BY PERIOD_YEAR DESC, UNITS_SOLD DESC"
- name: dealer_cost_reduction_opportunities
  question: Suggest ways to improve dealer profitability based on current metrics.
  sql: "WITH bottom_10_dealers AS (\n  SELECT DEALER_NAME, GROSS_PROFIT_MARGIN_PCT\n  FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n\
    \  ORDER BY GROSS_PROFIT_MARGIN_PCT ASC\n  LIMIT 10\n)\nSELECT\n  b.DEALER_NAME,\n  b.GROSS_PROFIT_MARGIN_PCT,\n  CASE\n\
    \    WHEN b.GROSS_PROFIT_MARGIN_PCT < 15 THEN '1_Improve_Margins - Margin below 15%'\n    WHEN cc.CCC > 60 THEN '2_Optimize_CCC\
    \ - CCC above 60 days'\n    WHEN cc.DIO > 45 THEN '3_Reduce_Inventory - High inventory days'\n    WHEN bo.BACKORDER_INCIDENCE_PCT\
    \ > 15 THEN '4_Improve_Availability - High backorder rate'\n    WHEN l.AVG_ORDER_LEAD_TIME_DAYS > 7 THEN '5_Speed_Delivery\
    \ - Long lead times'\n    ELSE '6_Maintain_Performance'\n  END as PRIMARY_OPPORTUNITY,\n  CASE \n      WHEN b.GROSS_PROFIT_MARGIN_PCT\
    \ < 15 THEN 'Review pricing strategy and reduce COGS'\n      WHEN cc.CCC > 60 THEN 'Accelerate collections (DSO) and negotiate\
    \ better payment terms'\n      WHEN cc.DIO > 45 THEN 'Optimize stock levels and reduce holding costs'\n      WHEN bo.BACKORDER_INCIDENCE_PCT\
    \ > 15 THEN 'Improve demand forecasting and supplier coordination'\n      WHEN l.AVG_ORDER_LEAD_TIME_DAYS > 7 THEN 'Optimize\
    \ order fulfillment and logistics'\n      ELSE 'Continue current strategy'\n    END as RECOMMENDED_ACTION\n  FROM bottom_10_dealers\
    \ b\n  LEFT JOIN DEALER.INFORMATION_MART.VW_CASH_CONVERSION_CYCLE cc\n    ON b.DEALER_NAME = cc.DEALER_NAME\n  LEFT JOIN\
    \ DEALER.INFORMATION_MART.VW_BACKORDER_INCIDENCE bo\n    ON b.DEALER_NAME = bo.DEALER_NAME\n  LEFT JOIN DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\
    \ l\n    ON b.DEALER_NAME = l.DEALER_NAME\n  ORDER BY b.GROSS_PROFIT_MARGIN_PCT ASC;"
- name: lead_time_analysis_2026
  question: What is the average order lead time?
  use_as_onboarding_question: true
  sql: "WITH avg_lead AS (\n  SELECT \n    DEALER_NAME,\n    ROUND(AVG(AVG_ORDER_LEAD_TIME_DAYS), 1) AS AVG_LEAD_TIME_DAYS\n\
    \  FROM DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\n  WHERE AVG_ORDER_LEAD_TIME_DAYS IS NOT NULL\n  GROUP BY DEALER_NAME\n\
    )\nSELECT \n  l.DEALER_NAME,\n  l.AVG_LEAD_TIME_DAYS\nFROM avg_lead l\nORDER BY l.AVG_LEAD_TIME_DAYS DESC;"
- name: top_5_dealers_by_revenue
  question: Who are my top 5 dealers? List all the top 5 dealers. Show the top 5 dealers by revenue. What are my top dealers?
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Top dealer name'
  - 'TOTAL_REVENUE: Total revenue in dollars'
  - 'revenue_share_pct: Percentage of company revenue (usually ~50-80% for top 5)'
  - 'GROSS_PROFIT_MARGIN_PCT: Dealer profit margin %'
  - 'rank: 1-5 ranking by revenue'
  expected_row_count: Exactly 5 dealers (top 5 only)
  sort_order: By TOTAL_REVENUE descending (highest revenue first)
  visual_recommendation: Bar chart showing top 5 dealers ranked 1-5; color bars red if margin <15%, yellow if 15-20%, green
    if >20%
  prescriptive_guidance: Show top dealers dominate company revenue; flag if any top dealer has margin <15% (critical issue);
    cite exact revenue % and margin
  sql: "SELECT \n  DEALER_NAME,\n  TOTAL_REVENUE,\n  ROUND(100.0 * TOTAL_REVENUE / SUM(TOTAL_REVENUE) OVER (), 2) as revenue_share_pct,\n\
    \  GROSS_PROFIT_MARGIN_PCT,\n  ROW_NUMBER() OVER (ORDER BY TOTAL_REVENUE DESC) as rank\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n\
    WHERE TOTAL_REVENUE IS NOT NULL\nQUALIFY rank <= 5\nORDER BY TOTAL_REVENUE DESC;"
- name: top_5_dealers_by_profitability
  question: Top 5 most profitable dealers. Which dealers are most profitable? Show top dealers by profit.
  sql: "SELECT \n  DEALER_NAME,\n  GROSS_PROFIT_MARGIN_PCT,\n  TOTAL_REVENUE,\n  TOTAL_COGS,\n  ROUND(TOTAL_REVENUE * GROSS_PROFIT_MARGIN_PCT\
    \ / 100, 2) as gross_profit_amount,\n  ROW_NUMBER() OVER (ORDER BY GROSS_PROFIT_MARGIN_PCT DESC) as rank\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n\
    WHERE GROSS_PROFIT_MARGIN_PCT IS NOT NULL\nQUALIFY rank <= 5\nORDER BY GROSS_PROFIT_MARGIN_PCT DESC;"
- name: top_5_dealers_by_growth
  question: Top 5 fastest growing dealers. Which dealers have the highest growth? Show top dealers by growth rate.
  sql: "SELECT \n  DEALER_NAME,\n  REVENUE_GROWTH_MOM_PERCENT,\n  REVENUE,\n  PREV_MONTH_REVENUE,\n  PERIOD_YEAR,\n  ROW_NUMBER()\
    \ OVER (ORDER BY REVENUE_GROWTH_MOM_PERCENT DESC) as rank\nFROM DEALER.INFORMATION_MART.VW_DEALER_REVENUE_GROWTH\nWHERE\
    \ REVENUE_GROWTH_MOM_PERCENT IS NOT NULL\nQUALIFY rank <= 5\nORDER BY REVENUE_GROWTH_MOM_PERCENT DESC;"
- name: dealers_losing_money
  question: Which dealers are losing money? Which dealers are unprofitable? Show dealers with low profit. Who is making the
    least profit?
  sql: "SELECT \n  DEALER_NAME,\n  GROSS_PROFIT_MARGIN_PCT,\n  TOTAL_REVENUE,\n  TOTAL_COGS,\n  ROUND(TOTAL_REVENUE * GROSS_PROFIT_MARGIN_PCT\
    \ / 100, 2) as gross_profit_amount,\n  CASE \n    WHEN GROSS_PROFIT_MARGIN_PCT < 10 THEN 'CRITICAL - Very Low Profit'\n\
    \    WHEN GROSS_PROFIT_MARGIN_PCT < 15 THEN 'WARNING - Below Average'\n    ELSE 'OK'\n  END as profit_health\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n\
    WHERE GROSS_PROFIT_MARGIN_PCT IS NOT NULL\nORDER BY GROSS_PROFIT_MARGIN_PCT ASC;"
- name: sales_comparison
  question: Compare dealer sales. Show me sales by dealer. Which dealer makes the most sales? Who has the highest sales? Sales
    comparison.
  sql: "SELECT \n  DEALER_NAME,\n  ROUND(TOTAL_REVENUE, 2) as total_sales,\n  ROUND(TOTAL_REVENUE / SUM(TOTAL_REVENUE) OVER\
    \ () * 100, 2) as sales_percentage,\n  ROUND((TOTAL_REVENUE - LAG(TOTAL_REVENUE) OVER (ORDER BY TOTAL_REVENUE DESC)) /\
    \ LAG(TOTAL_REVENUE) OVER (ORDER BY TOTAL_REVENUE DESC) * 100, 2) as vs_next_dealer_pct\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n\
    WHERE TOTAL_REVENUE IS NOT NULL\nORDER BY TOTAL_REVENUE DESC;"
- name: dealer_costs
  question: What are dealer costs? Show me cost breakdown. What is each dealer spending? Who has the highest costs? Cost analysis
    by dealer.
  sql: "SELECT \n  DEALER_NAME,\n  ROUND(TOTAL_REVENUE, 2) as sales,\n  ROUND(TOTAL_COGS, 2) as costs,\n  ROUND(TOTAL_REVENUE\
    \ - TOTAL_COGS, 2) as gross_profit,\n  GROSS_PROFIT_MARGIN_PCT as profit_margin_pct,\n  ROUND(100.0 * TOTAL_COGS / TOTAL_REVENUE,\
    \ 2) as cost_percent_of_sales\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\nWHERE TOTAL_REVENUE IS NOT NULL\n\
    ORDER BY TOTAL_COGS DESC;"
- name: dealer_performance_summary
  question: How are dealers performing? Give me dealer performance overview. Show dealer performance comparison. Performance
    summary.
  sql: "WITH growth_agg AS (\n  SELECT\n    r.DEALER_NAME,\n    AVG(r.REVENUE_GROWTH_MOM_PERCENT) AS avg_growth_rate_pct\n\
    \  FROM DEALER.INFORMATION_MART.VW_DEALER_REVENUE_GROWTH r\n  WHERE r.REVENUE_GROWTH_MOM_PERCENT IS NOT NULL\n  GROUP\
    \ BY r.DEALER_NAME\n)\nSELECT \n  g.DEALER_NAME,\n  ROUND(g.TOTAL_REVENUE, 0) as total_sales,\n  g.GROSS_PROFIT_MARGIN_PCT\
    \ as profit_margin_pct,\n  ga.avg_growth_rate_pct as growth_rate_pct,\n  CASE \n    WHEN g.GROSS_PROFIT_MARGIN_PCT >=\
    \ 20 AND COALESCE(ga.avg_growth_rate_pct, 0) > 5 THEN 'EXCELLENT - Growing & Profitable'\n    WHEN g.GROSS_PROFIT_MARGIN_PCT\
    \ >= 15 THEN 'GOOD - Healthy Margins'\n    WHEN g.GROSS_PROFIT_MARGIN_PCT < 15 AND COALESCE(ga.avg_growth_rate_pct, 0)\
    \ < 0 THEN 'CRITICAL - Declining & Low Profit'\n    WHEN g.GROSS_PROFIT_MARGIN_PCT < 15 THEN 'WARNING - Low Profit Margins'\n\
    \    ELSE 'FAIR'\n  END as performance_status\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN g\nLEFT JOIN growth_agg\
    \ ga\n  ON g.DEALER_NAME = ga.DEALER_NAME\nORDER BY g.GROSS_PROFIT_MARGIN_PCT DESC;"
- name: dealer_health_scorecard
  question: Tell me about dealer health. What is the dealer health status? Show dealer health. Dealer health check. Overall
    dealer health.
  use_as_onboarding_question: true
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'REVENUE_STATUS: Revenue health (STRONG/GROWING/DECLINING/CRITICAL)'
  - 'PROFITABILITY: Margin health (EXCELLENT/GOOD/WARNING/CRITICAL)'
  - 'OPERATIONAL_EFFICIENCY: Service & lead time rating'
  - 'INVENTORY_HEALTH: Stock availability status'
  - 'CASH_HEALTH: Cash conversion cycle status'
  - 'OVERALL_HEALTH_SCORE: 0-100 overall health rating'
  expected_row_count: All dealers with comprehensive health metrics
  sort_order: By OVERALL_HEALTH_SCORE descending (healthiest first)
  visual_recommendation: 'Health dashboard with color-coded scorecard: RED=CRITICAL, ORANGE=WARNING, YELLOW=FAIR, GREEN=GOOD/EXCELLENT'
  prescriptive_guidance: Flag dealers with CRITICAL status in any dimension; provide specific actions for each failing metric;
    benchmark against company averages
  sql: "WITH profitability AS (\n  SELECT \n    DEALER_NAME,\n    GROSS_PROFIT_MARGIN_PCT,\n    CASE \n      WHEN GROSS_PROFIT_MARGIN_PCT\
    \ >= 20 THEN 'EXCELLENT'\n      WHEN GROSS_PROFIT_MARGIN_PCT >= 15 THEN 'GOOD'\n      WHEN GROSS_PROFIT_MARGIN_PCT >=\
    \ 10 THEN 'WARNING'\n      ELSE 'CRITICAL'\n    END as profit_status\n  FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n\
    ),\ngrowth_trend AS (\n  SELECT \n    DEALER_NAME,\n    AVG(REVENUE_GROWTH_MOM_PERCENT) as avg_growth,\n    CASE \n  \
    \    WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > 10 THEN 'STRONG'\n      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > 5 THEN 'GROWING'\n\
    \      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > 0 THEN 'STABLE'\n      WHEN AVG(REVENUE_GROWTH_MOM_PERCENT) > -5 THEN 'DECLINING'\n\
    \      ELSE 'CRITICAL'\n    END as revenue_status\n  FROM DEALER.INFORMATION_MART.VW_DEALER_REVENUE_GROWTH\n  WHERE REVENUE_GROWTH_MOM_PERCENT\
    \ IS NOT NULL\n  GROUP BY DEALER_NAME\n),\noperational_eff AS (\n  SELECT \n    DEALER_NAME,\n    AVG(AVG_TURNAROUND_HOURS)\
    \ as avg_turnaround,\n    CASE \n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 24 THEN 'EXCELLENT'\n      WHEN AVG(AVG_TURNAROUND_HOURS)\
    \ <= 48 THEN 'GOOD'\n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 72 THEN 'FAIR'\n      ELSE 'CRITICAL'\n    END as efficiency_status\n\
    \  FROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\n  WHERE AVG_TURNAROUND_HOURS IS NOT NULL\n  GROUP BY\
    \ DEALER_NAME\n),\ninventory_status_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(STOCK_AVAILABILITY_PCT) as avg_stock,\n\
    \    CASE \n      WHEN AVG(STOCK_AVAILABILITY_PCT) >= 95 THEN 'EXCELLENT'\n      WHEN AVG(STOCK_AVAILABILITY_PCT) >= 85\
    \ THEN 'GOOD'\n      WHEN AVG(STOCK_AVAILABILITY_PCT) >= 75 THEN 'WARNING'\n      ELSE 'CRITICAL'\n    END as inventory_status\n\
    \  FROM DEALER.INFORMATION_MART.VW_STOCK_AVAILABILITY_DEALER\n  WHERE STOCK_AVAILABILITY_PCT IS NOT NULL\n  GROUP BY DEALER_NAME\n\
    ),\ncash_status_agg AS (\n  SELECT \n    DEALER_NAME,\n    CCC,\n    CASE \n      WHEN CCC < 30 THEN 'GOOD'\n      WHEN\
    \ CCC < 45 THEN 'NORMAL'\n      WHEN CCC < 60 THEN 'WARNING'\n      ELSE 'CRITICAL'\n    END as cash_health\n  FROM DEALER.INFORMATION_MART.VW_CASH_CONVERSION_CYCLE\n\
    )\nSELECT \n  p.DEALER_NAME,\n  COALESCE(g.revenue_status, 'UNKNOWN') as REVENUE_STATUS,\n  COALESCE(p.profit_status,\
    \ 'UNKNOWN') as PROFITABILITY,\n  COALESCE(o.efficiency_status, 'UNKNOWN') as OPERATIONAL_EFFICIENCY,\n  COALESCE(i.inventory_status,\
    \ 'UNKNOWN') as INVENTORY_HEALTH,\n  COALESCE(c.cash_health, 'UNKNOWN') as CASH_HEALTH,\n  CASE \n    WHEN COALESCE(g.revenue_status,\
    \ 'UNKNOWN') = 'CRITICAL' OR \n         COALESCE(p.profit_status, 'UNKNOWN') = 'CRITICAL' OR \n         COALESCE(o.efficiency_status,\
    \ 'UNKNOWN') = 'CRITICAL' OR\n         COALESCE(i.inventory_status, 'UNKNOWN') = 'CRITICAL' OR\n         COALESCE(c.cash_health,\
    \ 'UNKNOWN') = 'CRITICAL' THEN 20\n    WHEN COALESCE(p.profit_status, 'UNKNOWN') = 'WARNING' OR \n         COALESCE(i.inventory_status,\
    \ 'UNKNOWN') = 'WARNING' THEN 50\n    WHEN COALESCE(p.profit_status, 'UNKNOWN') = 'GOOD' AND \n         COALESCE(g.revenue_status,\
    \ 'UNKNOWN') IN ('STRONG', 'GROWING') THEN 85\n    WHEN COALESCE(p.profit_status, 'UNKNOWN') = 'EXCELLENT' THEN 90\n \
    \   ELSE 70\n  END as OVERALL_HEALTH_SCORE\nFROM profitability p\nLEFT JOIN growth_trend g ON p.DEALER_NAME = g.DEALER_NAME\n\
    LEFT JOIN operational_eff o ON p.DEALER_NAME = o.DEALER_NAME\nLEFT JOIN inventory_status_agg i ON p.DEALER_NAME = i.DEALER_NAME\n\
    LEFT JOIN cash_status_agg c ON p.DEALER_NAME = c.DEALER_NAME\nORDER BY OVERALL_HEALTH_SCORE DESC;"
- name: slow_dealers
  question: Which dealers are slow? Show me dealer delivery times. Who has the longest lead time? Which dealers are taking
    too long? Lead time comparison.
  sql: "SELECT\n  DEALER_NAME,\n  ROUND(AVG(AVG_ORDER_LEAD_TIME_DAYS), 1) as avg_lead_time_days,\n  MIN(AVG_ORDER_LEAD_TIME_DAYS)\
    \ as fastest_delivery_days,\n  MAX(AVG_ORDER_LEAD_TIME_DAYS) as slowest_delivery_days,\n  CASE\n    WHEN AVG(AVG_ORDER_LEAD_TIME_DAYS)\
    \ > 14 THEN 'SLOW - More than 2 weeks'\n    WHEN AVG(AVG_ORDER_LEAD_TIME_DAYS) > 7 THEN 'MEDIUM - 1-2 weeks'\n    WHEN\
    \ AVG(AVG_ORDER_LEAD_TIME_DAYS) <= 7 THEN 'FAST - Less than 1 week'\n    ELSE 'UNKNOWN'\n  END as speed_rating\nFROM DEALER.INFORMATION_MART.VW_ORDER_LEAD_TIME\n\
    WHERE AVG_ORDER_LEAD_TIME_DAYS IS NOT NULL\nGROUP BY DEALER_NAME\nORDER BY avg_lead_time_days DESC;"
- name: dealer_inventory_issues
  question: Which dealers have inventory problems? Show me stock issues. Who has out of stock problems? Inventory shortage
    analysis.
  sql: "WITH stock_agg AS (\n  SELECT \n    DEALER_NAME,\n    AVG(STOCK_AVAILABILITY_PCT) as avg_availability_pct\n  FROM\
    \ DEALER.INFORMATION_MART.VW_STOCK_AVAILABILITY_DEALER\n  GROUP BY DEALER_NAME\n),\nbackorder_agg AS (\n  SELECT \n  \
    \  DEALER_NAME,\n    AVG(BACKORDER_INCIDENCE_PCT) as avg_backorder_rate\n  FROM DEALER.INFORMATION_MART.VW_BACKORDER_INCIDENCE\n\
    \  GROUP BY DEALER_NAME\n)\nSELECT \n  s.DEALER_NAME,\n  ROUND(s.avg_availability_pct, 1) as avg_availability_pct,\n \
    \ ROUND(COALESCE(b.avg_backorder_rate, 0), 1) as BACKORDER_INCIDENCE_PCT,\n  CASE \n    WHEN s.avg_availability_pct <\
    \ 80 AND COALESCE(b.avg_backorder_rate, 0) > 20 THEN 'CRITICAL - Severe Shortage'\n    WHEN s.avg_availability_pct < 85\
    \ THEN 'WARNING - Low Stock'\n    WHEN COALESCE(b.avg_backorder_rate, 0) > 15 THEN 'WARNING - Many Backorders'\n    WHEN\
    \ s.avg_availability_pct >= 95 THEN 'EXCELLENT - Well Stocked'\n    ELSE 'GOOD'\n  END as inventory_status\nFROM stock_agg\
    \ s\nLEFT JOIN backorder_agg b\n  ON s.DEALER_NAME = b.DEALER_NAME\nORDER BY s.avg_availability_pct ASC;"
- name: increase_dealer_profit_analysis
  question: How can we increase dealer profit? What strategies can improve dealer profitability? Which dealers have profit
    improvement opportunities? How to boost dealer earnings?
  description: Analyzes dealer profitability (contribution margin) against operational efficiency (repair turnaround time).
    Shows which dealers are high-margin but slow, or low-margin but fast. Identifies specific improvement opportunities.
  sql: "WITH margin_data AS (\n  SELECT \n    DEALER_NAME,\n    ROUND(AVG(CONTRIBUTION_MARGIN_PCT), 2) as avg_contribution_margin_pct\n\
    \  FROM DEALER.INFORMATION_MART.VW_DEALER_CONTRIBUTION_MARGIN\n  WHERE CONTRIBUTION_MARGIN_PCT IS NOT NULL\n  GROUP BY\
    \ DEALER_NAME\n),\nefficiency_data AS (\n  SELECT \n    DEALER_NAME,\n    ROUND(AVG(AVG_TURNAROUND_HOURS), 1) as avg_repair_hours,\n\
    \    CASE \n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 24 THEN 'VERY_FAST'\n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 48 THEN\
    \ 'FAST'\n      WHEN AVG(AVG_TURNAROUND_HOURS) <= 72 THEN 'MODERATE'\n      ELSE 'SLOW'\n    END as efficiency_rating\n\
    \  FROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\n  WHERE AVG_TURNAROUND_HOURS IS NOT NULL\n  GROUP BY\
    \ DEALER_NAME\n)\nSELECT \n  m.DEALER_NAME,\n  m.avg_contribution_margin_pct,\n  e.avg_repair_hours,\n  e.efficiency_rating,\n\
    \  CASE \n    WHEN m.avg_contribution_margin_pct >= 20 AND e.avg_repair_hours <= 48 THEN 'EXCELLENT - High Margin + Fast\
    \ Service'\n    WHEN m.avg_contribution_margin_pct >= 20 THEN 'OPPORTUNITY - High Margin, Slow Service → Speed up repairs'\n\
    \    WHEN m.avg_contribution_margin_pct < 15 AND e.avg_repair_hours <= 48 THEN 'OPPORTUNITY - Good Service, Low Margin\
    \ → Increase prices or reduce costs'\n    WHEN m.avg_contribution_margin_pct < 15 THEN 'CRITICAL - Low Margin + Slow Service\
    \ → Urgent: Improve both margin and efficiency'\n    ELSE 'FAIR - Medium performance'\n  END as profit_improvement_strategy\n\
    FROM margin_data m\nLEFT JOIN efficiency_data e\n  ON m.DEALER_NAME = e.DEALER_NAME\nORDER BY m.avg_contribution_margin_pct\
    \ DESC, e.avg_repair_hours ASC;"
- name: units_sold_by_dealer
  question: How many units were sold by each dealer? Units sold per dealer. Sales volume by dealer. Total units sold by dealer.
  use_as_onboarding_question: false
  expected_columns:
  - 'DEALER_NAME: Dealer identifier'
  - 'TOTAL_UNITS_SOLD: Total units sold in period'
  - 'units_share_pct: Percentage of total units (0-100)'
  - 'avg_monthly_units: Average units per month'
  expected_row_count: All dealers
  sort_order: By TOTAL_UNITS_SOLD descending (highest volume first)
  visual_recommendation: Bar chart showing total units by dealer
  prescriptive_guidance: Highlight top dealers by volume; compare to dealers with declining units
  sql: "WITH units_agg AS (\n  SELECT \n    DEALER_NAME,\n    SUM(COALESCE(UNITS_SOLD, 0)) AS total_units_sold,\n    COUNT(DISTINCT\
    \ PERIOD_YEAR) AS distinct_years,\n    COUNT(DISTINCT PERIOD_MONTH) AS distinct_months\n  FROM DEALER.INFORMATION_MART.VW_SALES_VOLUME\n\
    \  WHERE UNITS_SOLD IS NOT NULL\n  GROUP BY DEALER_NAME\n)\nSELECT \n  DEALER_NAME,\n  TOTAL_UNITS_SOLD,\n  ROUND(100.0\
    \ * TOTAL_UNITS_SOLD / SUM(TOTAL_UNITS_SOLD) OVER (), 2) AS units_share_pct,\n  CASE \n    WHEN distinct_months > 0 THEN\
    \ ROUND(TOTAL_UNITS_SOLD::FLOAT / distinct_months, 1)\n    ELSE TOTAL_UNITS_SOLD\n  END AS avg_monthly_units\nFROM units_agg\n\
    WHERE TOTAL_UNITS_SOLD > 0\nORDER BY TOTAL_UNITS_SOLD DESC;"
- name: gross_profit_margin_test_overview
  question: Show me gross profit margin test. Where are my gross profit margin test? Gross Profit Margin Test overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.TOTAL_REVENUE), 2) AS TOTAL_REVENUE,\n  ROUND(SUM(dl.TOTAL_COGS), 2) AS\
    \ TOTAL_COGS,\n  ROUND(AVG(dl.GROSS_PROFIT_MARGIN_PCT), 2) AS GROSS_PROFIT_MARGIN_PCT\nFROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN_TEST\
    \ dl\nGROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME;"
- name: gross_profit_margin_test_with_performance
  question: Show Gross Profit Margin Test with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(SUM(dl.TOTAL_REVENUE), 2) AS TOTAL_REVENUE,\n    ROUND(SUM(dl.TOTAL_COGS),\
    \ 2) AS TOTAL_COGS,\n    ROUND(AVG(dl.GROSS_PROFIT_MARGIN_PCT), 2) AS GROSS_PROFIT_MARGIN_PCT,\n  FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN_TEST\
    \ dl\n  GROUP BY dl.DEALER_NAME\n),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n\
    \    SUM(TOTAL_REVENUE) AS total_revenue\n  FROM DEALER.INFORMATION_MART.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n\
    )\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\n\
    LEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
- name: average_repair_turnaround_time_overview
  question: Show me average repair turnaround time. Where are my average repair turnaround time? Average Repair Turnaround
    Time overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.AVG_TURNAROUND_HOURS), 2) AS AVG_TURNAROUND_HOURS,\n  ROUND(SUM(dl.SERVICE_ORDERS_COUNT),\
    \ 2) AS SERVICE_ORDERS_COUNT\nFROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME dl\nGROUP BY dl.DEALER_NAME\n\
    ORDER BY dl.DEALER_NAME;"
- name: average_repair_turnaround_time_with_performance
  question: Show Average Repair Turnaround Time with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(SUM(dl.AVG_TURNAROUND_HOURS), 2) AS AVG_TURNAROUND_HOURS,\n\
    \    ROUND(SUM(dl.SERVICE_ORDERS_COUNT), 2) AS SERVICE_ORDERS_COUNT,\n  FROM DEALER.INFORMATION_MART.VW_AVERAGE_REPAIR_TURNAROUND_TIME\
